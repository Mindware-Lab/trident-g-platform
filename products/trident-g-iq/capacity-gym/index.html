<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Opening Capacity Gym</title>
  <script>
    (function () {
      var target = new URL("/apps/capacity-gym/", window.location.origin);
      target.search = window.location.search || "";
      target.hash = window.location.hash || "";
      window.location.replace(target.toString());
    })();
  </script>
</head>
<body>
  <p>Opening Capacity Gym...</p>
  <p>If you are not redirected, <a href="/apps/capacity-gym/">open Capacity Gym</a>.</p>
</body>
</html>
