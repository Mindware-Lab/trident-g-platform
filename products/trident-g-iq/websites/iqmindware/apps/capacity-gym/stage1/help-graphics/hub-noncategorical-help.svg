<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Hub Non-Categorical Help Graphic</title>
  <desc id="desc">Cued n-back in non-categorical mode with arbitrary symbol and color mapping.</desc>
  <defs>
    <style>
      .bg { fill: #f4f7fb; }
      .panel { fill: #ffffff; stroke: #d8e2f0; stroke-width: 2; }
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #11213a; }
      .sub { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #344861; }
      .txt { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #11213a; }
      .small { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #4b5f78; }
      .ring { fill: none; stroke: #c9d8ec; stroke-width: 12; }
      .dot { fill: #d6e3f4; }
      .timeline { fill: #f9fbff; stroke: #d6e4f6; stroke-width: 2; rx: 14; }
      .card { fill: #ffffff; stroke: #cedced; stroke-width: 2; rx: 12; }
      .match { fill: #d9f3e4; stroke: #6ebf8c; stroke-width: 2; rx: 12; }
      .chip { fill: #eaf2ff; stroke: #9dbcf1; stroke-width: 1.5; rx: 12; }
      .arrow { stroke: #6c7f98; stroke-width: 3; marker-end: url(#m); }
      .accent { fill: #1f4b84; font: 700 18px 'Segoe UI', Arial, sans-serif; }
    </style>
    <marker id="m" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#6c7f98"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="720"/>
  <rect class="panel" x="30" y="26" width="1140" height="668" rx="24"/>

  <text class="title" x="66" y="82">Hub Non-Categorical</text>
  <text class="sub" x="66" y="114">Same n-back rule, but symbols and hues are arbitrary codes each block.</text>

  <rect class="chip" x="66" y="144" width="245" height="42"/>
  <text class="txt" x="88" y="171">Target: SYMBOL</text>

  <g transform="translate(80,220)">
    <rect class="timeline" x="0" y="0" width="540" height="420"/>
    <text class="txt" x="24" y="34">Stimulus Arena (rotated mapping)</text>
    <circle class="ring" cx="270" cy="225" r="152"/>

    <circle class="dot" cx="147" cy="127" r="8"/>
    <circle class="dot" cx="368" cy="102" r="8"/>
    <circle class="dot" cx="392" cy="323" r="8"/>
    <circle class="dot" cx="171" cy="348" r="8"/>

    <circle cx="392" cy="323" r="44" fill="#1ea7c4"/>
    <polygon points="392,300 412,336 372,336" fill="#ffffff"/>

    <text class="small" x="24" y="386">Do not name categories. Track exact symbol identity at n-back.</text>
  </g>

  <g transform="translate(640,220)">
    <rect class="timeline" x="0" y="0" width="470" height="420"/>
    <text class="txt" x="22" y="34">n-back Decision Timeline (target = SYMBOL)</text>

    <rect class="card" x="22" y="74" width="126" height="146"/>
    <text class="small" x="34" y="103">t-2</text>
    <circle cx="85" cy="154" r="26" fill="#d06c29"/>
    <rect x="73" y="142" width="24" height="24" fill="#ffffff"/>
    <text class="small" x="36" y="200">Square</text>

    <rect class="card" x="172" y="74" width="126" height="146"/>
    <text class="small" x="184" y="103">t-1</text>
    <circle cx="235" cy="154" r="26" fill="#1ea7c4"/>
    <polygon points="235,141 248,167 222,167" fill="#ffffff"/>
    <text class="small" x="193" y="200">Triangle</text>

    <rect class="match" x="322" y="74" width="126" height="146"/>
    <text class="small" x="334" y="103">t</text>
    <circle cx="385" cy="154" r="26" fill="#2c8f5a"/>
    <rect x="373" y="142" width="24" height="24" fill="#ffffff"/>
    <text class="small" x="343" y="200">Square</text>

    <line class="arrow" x1="107" y1="254" x2="365" y2="254"/>
    <text class="accent" x="162" y="247">SYMBOL match at 2-back</text>

    <rect class="chip" x="22" y="300" width="426" height="86"/>
    <text class="txt" x="40" y="334">Action:</text>
    <text class="small" x="104" y="334">Press MATCH even if color/location changed.</text>
    <text class="small" x="40" y="366">Mapping is stable within a block, then refreshes next block.</text>
  </g>
</svg>
