<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Graph 1-back Match</title>
  <desc id="desc">Two displays showing a directed-edge graph 1-back match.</desc>
  <defs>
    <style>
      .bg { fill: #f4f8fc; }
      .panel { fill: #ffffff; stroke: #d8e2ef; stroke-width: 2; }
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #12223a; }
      .sub { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #344861; }
      .card { fill: #f9fbff; stroke: #d6e3f5; stroke-width: 2; rx: 14; }
      .match { fill: #dbf4e6; stroke: #70bf8f; stroke-width: 2; rx: 14; }
      .txt { font: 600 20px 'Segoe UI', Arial, sans-serif; fill: #12223a; }
      .small { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #4b5f78; }
      .accent { fill: #1f4b84; font: 700 19px 'Segoe UI', Arial, sans-serif; }
      .chip { fill: #eaf2ff; stroke: #9dbcf1; stroke-width: 1.5; rx: 12; }
      .edge { stroke: #4b5f78; stroke-width: 4; marker-end: url(#m); }
      .nodeLabel { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #ffffff; text-anchor: middle; dominant-baseline: middle; }
      .arrow { stroke: #73839a; stroke-width: 3; marker-end: url(#m2); }
    </style>
    <marker id="m" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#4b5f78"/>
    </marker>
    <marker id="m2" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#73839a"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="720"/>
  <rect class="panel" x="30" y="26" width="1140" height="668" rx="24"/>

  <text class="title" x="66" y="82">Graph: 1-back Match</text>
  <text class="sub" x="66" y="114">Press MATCH at t when directed edge matches t-1.</text>
  <rect class="chip" x="66" y="144" width="290" height="42"/>
  <text class="small" x="86" y="171">Node layout can change; edge direction must match</text>

  <g transform="translate(95,220)">
    <rect class="card" x="0" y="0" width="470" height="390"/>
    <text class="txt" x="24" y="36">Display 1 (t-1)</text>
    <circle cx="235" cy="200" r="126" fill="none" stroke="#cbd9ec" stroke-width="10"/>
    <line class="edge" x1="235" y1="86" x2="349" y2="200"/>
    <circle cx="235" cy="86" r="22" fill="#dc2626"/><text class="nodeLabel" x="235" y="86">R</text>
    <circle cx="349" cy="200" r="22" fill="#16a34a"/><text class="nodeLabel" x="349" y="200">G</text>
    <circle cx="235" cy="314" r="22" fill="#2563eb"/><text class="nodeLabel" x="235" y="314">B</text>
    <circle cx="121" cy="200" r="22" fill="#f59e0b"/><text class="nodeLabel" x="121" y="200">Y</text>
    <text class="small" x="24" y="362">Canonical edge: R-&gt;G</text>
  </g>

  <g transform="translate(635,220)">
    <rect class="match" x="0" y="0" width="470" height="390"/>
    <text class="txt" x="24" y="36">Display 2 (t)</text>
    <circle cx="235" cy="200" r="126" fill="none" stroke="#cbd9ec" stroke-width="10"/>
    <line class="edge" x1="121" y1="200" x2="235" y2="86"/>
    <circle cx="235" cy="86" r="22" fill="#16a34a"/><text class="nodeLabel" x="235" y="86">G</text>
    <circle cx="349" cy="200" r="22" fill="#2563eb"/><text class="nodeLabel" x="349" y="200">B</text>
    <circle cx="235" cy="314" r="22" fill="#f59e0b"/><text class="nodeLabel" x="235" y="314">Y</text>
    <circle cx="121" cy="200" r="22" fill="#dc2626"/><text class="nodeLabel" x="121" y="200">R</text>
    <text class="small" x="24" y="362">Canonical edge: R-&gt;G (match)</text>
  </g>

  <line class="arrow" x1="525" y1="650" x2="675" y2="650"/>
  <text class="accent" x="445" y="686">MATCH now: same directed edge at 1-back</text>
</svg>
