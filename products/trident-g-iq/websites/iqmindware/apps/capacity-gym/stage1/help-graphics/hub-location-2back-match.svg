<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Hub Location 2-back Match</title>
  <desc id="desc">Three displays showing a LOCATION 2-back match in hub categorical mode.</desc>
  <defs>
    <style>
      .bg { fill: #f3f7fc; }
      .panel { fill: #ffffff; stroke: #d8e2f0; stroke-width: 2; }
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #10233b; }
      .sub { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #344861; }
      .card { fill: #f8fbff; stroke: #d6e3f5; stroke-width: 2; rx: 14; }
      .match-card { fill: #daf4e6; stroke: #6ebe8d; stroke-width: 2; rx: 14; }
      .txt { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #10233b; }
      .small { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #4b5f78; }
      .ring { fill: none; stroke: #c8d6ea; stroke-width: 10; }
      .dot { fill: #d5e2f4; }
      .chip { fill: #eaf2ff; stroke: #9ebff4; stroke-width: 1.5; rx: 12; }
      .accent { fill: #204a86; font: 700 19px 'Segoe UI', Arial, sans-serif; }
      .arrow { stroke: #6b7f9b; stroke-width: 3; marker-end: url(#m); }
    </style>
    <marker id="m" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#6b7f9b"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="720"/>
  <rect class="panel" x="30" y="26" width="1140" height="668" rx="24"/>
  <text class="title" x="66" y="82">LOCATION 2-back Match</text>
  <text class="sub" x="66" y="114">Three displays: press MATCH at t because location matches t-2.</text>

  <rect class="chip" x="66" y="144" width="226" height="42"/>
  <text class="txt" x="88" y="171">Target: LOCATION</text>

  <g transform="translate(60,220)">
    <rect class="card" x="0" y="0" width="340" height="390"/>
    <text class="txt" x="18" y="34">Display 1 (t-2)</text>
    <circle class="ring" cx="170" cy="190" r="112"/>
    <circle class="dot" cx="170" cy="78" r="6"/>
    <circle class="dot" cx="282" cy="190" r="6"/>
    <circle class="dot" cx="170" cy="302" r="6"/>
    <circle class="dot" cx="58" cy="190" r="6"/>
    <circle cx="170" cy="78" r="32" fill="#111827"/>
    <text x="170" y="86" text-anchor="middle" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#ffffff">A</text>
    <text class="small" x="18" y="362">Location = Top marker</text>
  </g>

  <g transform="translate(430,220)">
    <rect class="card" x="0" y="0" width="340" height="390"/>
    <text class="txt" x="18" y="34">Display 2 (t-1)</text>
    <circle class="ring" cx="170" cy="190" r="112"/>
    <circle class="dot" cx="170" cy="78" r="6"/>
    <circle class="dot" cx="282" cy="190" r="6"/>
    <circle class="dot" cx="170" cy="302" r="6"/>
    <circle class="dot" cx="58" cy="190" r="6"/>
    <circle cx="282" cy="190" r="32" fill="#dc2626"/>
    <text x="282" y="198" text-anchor="middle" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#ffffff">B</text>
    <text class="small" x="18" y="362">Location = Right marker</text>
  </g>

  <g transform="translate(800,220)">
    <rect class="match-card" x="0" y="0" width="340" height="390"/>
    <text class="txt" x="18" y="34">Display 3 (t)</text>
    <circle class="ring" cx="170" cy="190" r="112"/>
    <circle class="dot" cx="170" cy="78" r="6"/>
    <circle class="dot" cx="282" cy="190" r="6"/>
    <circle class="dot" cx="170" cy="302" r="6"/>
    <circle class="dot" cx="58" cy="190" r="6"/>
    <circle cx="170" cy="78" r="32" fill="#2563eb"/>
    <text x="170" y="86" text-anchor="middle" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#ffffff">C</text>
    <text class="small" x="18" y="362">Location = Top marker (matches t-2)</text>
  </g>

  <line class="arrow" x1="225" y1="645" x2="960" y2="645"/>
  <text class="accent" x="398" y="684">MATCH now: same LOCATION at 2-back</text>
</svg>
