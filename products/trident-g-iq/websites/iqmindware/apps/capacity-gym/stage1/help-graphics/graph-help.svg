<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Graph Relational N-Back Help Graphic</title>
  <desc id="desc">Directed edge n-back with exact two step path quiz examples.</desc>
  <defs>
    <style>
      .bg { fill: #f4f8fc; }
      .panel { fill: #ffffff; stroke: #d8e2ef; stroke-width: 2; }
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #12223a; }
      .sub { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #344861; }
      .txt { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #12223a; }
      .small { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #4b5f78; }
      .card { fill: #f9fbff; stroke: #d6e3f5; stroke-width: 2; rx: 14; }
      .token { fill: #ffffff; stroke: #ceddee; stroke-width: 2; rx: 10; }
      .quiz { fill: #eef5ff; stroke: #b8cdee; stroke-width: 2; rx: 12; }
      .match { fill: #dbf4e6; stroke: #70bf8f; stroke-width: 2; rx: 10; }
      .true { fill: #1f7a48; font: 700 16px 'Segoe UI', Arial, sans-serif; }
      .false { fill: #b02020; font: 700 16px 'Segoe UI', Arial, sans-serif; }
      .accent { fill: #1f4b84; font: 700 18px 'Segoe UI', Arial, sans-serif; }
      .edge { stroke: #4b5f78; stroke-width: 4; marker-end: url(#m); }
      .edge-soft { stroke: #9cb0c8; stroke-width: 3; marker-end: url(#m2); }
      .nodeLabel { font: 700 17px 'Segoe UI', Arial, sans-serif; fill: #ffffff; text-anchor: middle; dominant-baseline: middle; }
    </style>
    <marker id="m" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#4b5f78"/>
    </marker>
    <marker id="m2" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#9cb0c8"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="720"/>
  <rect class="panel" x="30" y="26" width="1140" height="668" rx="24"/>

  <text class="title" x="66" y="82">Relational: Graph</text>
  <text class="sub" x="66" y="114">Press MATCH when the same directed edge repeats at n-back.</text>

  <g transform="translate(70,170)">
    <rect class="card" x="0" y="0" width="530" height="500"/>
    <text class="txt" x="22" y="34">Stream Token Example (node positions can rotate)</text>

    <circle cx="265" cy="250" r="155" fill="none" stroke="#ccdaec" stroke-width="11"/>

    <line class="edge-soft" x1="265" y1="95" x2="420" y2="250"/>
    <line class="edge-soft" x1="420" y1="250" x2="265" y2="405"/>
    <line class="edge-soft" x1="265" y1="405" x2="110" y2="250"/>

    <line class="edge" x1="110" y1="250" x2="250" y2="105"/>

    <circle cx="265" cy="95" r="24" fill="#dc2626"/><text class="nodeLabel" x="265" y="95">R</text>
    <circle cx="420" cy="250" r="24" fill="#16a34a"/><text class="nodeLabel" x="420" y="250">G</text>
    <circle cx="265" cy="405" r="24" fill="#2563eb"/><text class="nodeLabel" x="265" y="405">B</text>
    <circle cx="110" cy="250" r="24" fill="#f59e0b"/><text class="nodeLabel" x="110" y="250">Y</text>

    <rect class="token" x="22" y="432" width="486" height="48"/>
    <text class="txt" x="44" y="463">Current token edge: Y -&gt; R (example)</text>
  </g>

  <g transform="translate(620,170)">
    <rect class="card" x="0" y="0" width="510" height="500"/>
    <text class="txt" x="24" y="34">Post-Block Quiz (exactly 2 steps)</text>

    <rect class="quiz" x="24" y="62" width="462" height="156"/>
    <text class="small" x="42" y="95">Question 1</text>
    <text class="txt" x="42" y="126">Is there a path from R to B in exactly 2 steps?</text>
    <text class="true" x="42" y="162">Correct answer: TRUE (R -&gt; G -&gt; B)</text>
    <text class="small" x="42" y="192">Use directed edges only.</text>

    <rect class="quiz" x="24" y="238" width="462" height="156"/>
    <text class="small" x="42" y="271">Question 2</text>
    <text class="txt" x="42" y="302">Is there a path from Y to G in exactly 2 steps?</text>
    <text class="false" x="42" y="338">Correct answer: FALSE</text>
    <text class="small" x="42" y="368">Direction matters; reverse paths do not count.</text>

    <rect class="match" x="24" y="418" width="462" height="62"/>
    <text class="txt" x="42" y="456">Action: MATCH during stream, then True/False on 2 timed items.</text>
  </g>
</svg>
