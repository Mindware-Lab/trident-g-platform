<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>G Tracker</title>

  <!-- Shared brand CSS (your deep blue header kit) -->
  <!-- Sync marker: 2026-02-27 -->
  <link rel="stylesheet" href="../../shared-ui/tokens.css">
  <link rel="stylesheet" href="../../shared-ui/shell.css">
  <link rel="stylesheet" href="../../shared-ui/components.css">
  <link rel="stylesheet" href="/trident-g-platform/branding/brand.css">

  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

  <style>
    /* Hub-specific helpers (keeps brand.css clean) */
    body{
      background: #dfe3e8 !important;
      padding-top: 72px;
    }

    .screen{
      min-height: calc(100vh - 72px);
    }

    @media (min-width: 960px){
      body{ padding-top: 90px; }
      .screen{ min-height: calc(100vh - 90px); }
      .tg-topbar{ height: 90px; }
      .tg-topbar__inner{ padding: 0 14px; }
      .tg-topbar__icon{
        width: 48px;
        height: 48px;
        border-radius: 14px;
      }
      .tg-topbar__icon img{
        width: 30px;
        height: 30px;
      }
      .tg-topbar__pill{
        padding: 9px 16px;
        font-size: 12px;
      }
    }

    .grid { display: grid; gap: 12px; }
    .grid2 { grid-template-columns: 1fr; }

    .content{
      max-width: 768px;
      width: 100%;
      margin: 0 auto;
    }

    .sectionTitle{
      margin: 4px 2px 0;
      font-weight: 900;
      font-size: 22px;
      line-height: 1.15;
      letter-spacing: -0.2px;
      color: var(--brand-text);
      overflow-wrap: anywhere;
    }

    .sectionNote{
      margin: 4px 2px 0;
      font-size: 15px;
      color: var(--brand-text-muted);
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .testRow{
      display:flex;
      flex-direction: column;
      justify-content:flex-start;
      align-items:stretch;
      gap: 10px;
      padding: 12px;
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
      border: 1px solid var(--brand-border-soft);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.02);
    }

    .testMeta{
      display:flex;
      flex-direction:column;
      gap:4px;
      min-width: 0;
    }

    .testName{
      font-weight: 900;
      font-size: 22px;
      margin: 0;
      color: var(--brand-text);
      overflow-wrap: anywhere;
    }

    .testDesc{
      margin: 0;
      font-size: 15px;
      color: var(--brand-text-muted);
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .tagRow{ display:flex; gap:6px; flex-wrap:wrap; margin-top: 4px; }
    .tag{
      font-size: 12px;
      font-weight: 800;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(110,198,255,0.08);
      border: 1px solid rgba(110,198,255,0.22);
      color: var(--brand-text);
      white-space: normal;
      text-align: center;
      line-height: 1.2;
      max-width: 100%;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.02);
    }
    .tagDone{
      background: rgba(204,255,102,0.95);
      border: 1px solid rgba(0,0,0,0.08);
      color:#0B1A0B;
      box-shadow: 0 0 0 1px rgba(204,255,102,.14), 0 8px 22px rgba(190,239,78,.12);
    }

    .rightCol{
      display:flex;
      flex-direction:column;
      gap:8px;
      align-items:flex-start;
      flex: 0 0 auto;
    }

    .miniRow{ display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-start; }

    .btnSmall{
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 800;
      white-space: normal;
      line-height: 1.15;
      text-align: center;
    }

    .input{
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--brand-border);
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.018));
      color: var(--brand-text);
      padding: 9px 10px;
      font-size: 14px;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.02);
    }
    .input:focus{
      border-color: rgba(110,198,255,.45);
      box-shadow: var(--brand-focus-ring);
    }
    .inputScoreReady{
      border-color: rgba(110,198,255,.48);
      box-shadow: var(--brand-focus-ring);
    }
    .input::placeholder{
      color: var(--brand-text-quiet);
      opacity: 1;
    }
    .input option{
      background: #121722;
      color: var(--brand-text);
    }

    .twoCol{
      display:grid;
      grid-template-columns: minmax(160px, 220px) minmax(260px, 1fr);
      gap: 8px;
      align-items: center;
      max-width: 640px;
    }

    @media (max-width: 720px){
      .twoCol{
        grid-template-columns: 1fr;
        max-width: none;
      }
    }

    .whenLine{
      margin: 8px 0 0 0;
      font-size: 14px;
      color: var(--brand-text);
      line-height: 1.4;
      overflow-wrap: anywhere;
    }

    .timepointRow{
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .timepointSelect{
      max-width: 260px;
    }

    .scoreReadout{
      margin-top: 8px;
      border: 1px solid var(--brand-border-soft);
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(255,255,255,.025), rgba(255,255,255,.014));
      padding: 8px 10px;
      max-width: 760px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.02);
    }

    .scoreReadoutTitle{
      margin: 0;
      font-size: 12px;
      font-weight: 900;
      color: var(--brand-text-label);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .scoreReadoutLine{
      margin-top: 4px;
      font-size: 14px;
      color: var(--brand-text-muted);
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .infoGrid{
      margin-top: 8px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      max-width: 760px;
    }

    .infoBlock{
      border: 1px solid var(--brand-border-soft);
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(255,255,255,.025), rgba(255,255,255,.014));
      padding: 8px 10px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.02);
    }

    .infoBlock summary{
      cursor: pointer;
      font-weight: 800;
      font-size: 14px;
      color: var(--brand-text);
      user-select: none;
    }
    .infoBlock summary:focus-visible{
      outline: none;
      box-shadow: var(--brand-focus-ring);
      border-radius: 8px;
    }

    .infoBlock p{
      margin: 8px 0 0 0;
    }

    .checkList{
      margin: 8px 0 0 18px;
      padding: 0;
      font-size: 14px;
      color: var(--brand-text-muted);
      line-height: 1.35;
    }
    .checkList li{
      overflow-wrap: anywhere;
    }

    .contextHint{
      margin-top: 8px;
      font-size: 13px;
      color: var(--z-blue-200);
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .historyHint{
      margin-top: 8px;
      font-size: 13px;
      color: var(--brand-text-muted);
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .muted{
      font-size: 14px;
      color: var(--brand-text-muted);
      line-height: 1.45;
      margin: 0;
      overflow-wrap: anywhere;
    }

    .progressStrip{
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(110,198,255,0.28);
      background: rgba(110,198,255,0.08);
      color: var(--brand-text);
      font-size: 14px;
      font-weight: 800;
      line-height: 1.35;
    }

    .programSetup{
      margin-top: 10px;
      border: 1px solid var(--brand-border-soft);
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.018));
      padding: 10px;
      display: grid;
      gap: 10px;
    }

    .programGrid{
      display: grid;
      grid-template-columns: repeat(3, minmax(160px, 1fr));
      gap: 8px;
    }

    .programField{
      display: grid;
      gap: 6px;
    }

    .programLabel{
      font-size: 12px;
      font-weight: 800;
      color: var(--brand-text-label);
      letter-spacing: .02em;
      text-transform: uppercase;
    }

    .sectionHeader{
      margin: 4px 0 0 0;
      font-size: 22px;
      font-weight: 900;
      color: var(--brand-text);
    }

    .sectionSub{
      margin: 4px 0 0 0;
      font-size: 14px;
      color: var(--brand-text-muted);
      line-height: 1.4;
    }

    .trackerCard{
      display: grid;
      gap: 10px;
      padding: 12px;
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
      border: 1px solid var(--brand-border-soft);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.02);
    }

    .trackerTitle{
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
      font-weight: 900;
      color: var(--z-blue-400);
    }

    .trackerPurpose{
      margin: 0;
      font-size: 14px;
      line-height: 1.4;
      color: var(--brand-text-muted);
    }

    .statusPill{
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 800;
      border: 1px solid transparent;
    }

    .statusUp{ background: rgba(204,255,102,.95); color: #0B1A0B; border-color: rgba(0,0,0,.08); }
    .statusDue{ background: rgba(255,204,102,.18); color: #ffd49c; border-color: rgba(255,174,79,.45); }
    .statusProgress{ background: rgba(110,198,255,.14); color: #9fd7ff; border-color: rgba(110,198,255,.32); }
    .statusNeutral{ background: rgba(255,255,255,.04); color: var(--brand-text-muted); border-color: var(--brand-border-soft); }

    .slotGrid{
      display: grid;
      grid-template-columns: repeat(2, minmax(200px, 1fr));
      gap: 8px;
    }

    .slotCard{
      border: 1px solid var(--brand-border-soft);
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.016));
      padding: 10px;
      display: grid;
      gap: 6px;
    }

    .slotLabel{ margin: 0; font-size: 12px; font-weight: 800; color: var(--brand-text-label); text-transform: uppercase; letter-spacing: .03em; }
    .slotMetric{ margin: 0; font-size: 24px; font-weight: 900; color: var(--brand-text); line-height: 1.1; }
    .slotDate{ margin: 0; font-size: 12px; color: var(--brand-text-muted); }

    .deltaBox{
      border: 1px solid var(--brand-border-soft);
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.016));
      padding: 10px;
      display: grid;
      gap: 6px;
    }

    .deltaLine{ margin: 0; font-size: 13px; color: var(--brand-text); font-weight: 700; }

    .deltaBarRow{
      display: grid;
      grid-template-columns: 70px 1fr 56px;
      gap: 8px;
      align-items: center;
    }

    .deltaBarLabel{ font-size: 12px; font-weight: 700; color: var(--brand-text-muted); }
    .deltaBarTrack{ height: 8px; border-radius: 999px; background: rgba(110,198,255,.15); overflow: hidden; }
    .deltaBarFill{ height: 100%; border-radius: 999px; background: linear-gradient(90deg, #6ec6ff, #4a92ff); }
    .deltaValue{ font-size: 12px; font-weight: 700; color: var(--brand-text-muted); text-align: right; }

    .cardActions{ display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .linkBtn{ border: none; background: transparent; color: #8bc5ff; font-size: 13px; font-weight: 800; padding: 0; cursor: pointer; text-decoration: underline; text-underline-offset: 2px; }
    .inlineDivider{ color: var(--brand-text-muted); font-size: 12px; font-weight: 800; }
    .logHint{ margin: 0; font-size: 14px; color: var(--brand-text); font-weight: 900; }

    .historyBlock{
      border: 1px solid var(--brand-border-soft);
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
      padding: 10px;
      display: grid;
      gap: 6px;
    }

    .historyLine{ margin: 0; font-size: 13px; color: var(--brand-text); line-height: 1.4; }

    .metricRow{
      display: grid;
      grid-template-columns: minmax(150px, 1fr) minmax(240px, 2fr);
      gap: 10px;
      align-items: stretch;
    }

    .latestBox,
    .sparkBox{
      border: 1px solid var(--brand-border-soft);
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
      padding: 10px;
      display: grid;
      gap: 4px;
    }

    .latestLabel,
    .sparkTitle{ margin: 0; font-size: 12px; font-weight: 800; color: var(--brand-text-label); letter-spacing: .03em; text-transform: uppercase; }
    .latestValue{ margin: 0; font-size: 30px; line-height: 1.05; font-weight: 900; color: var(--brand-text); }
    .latestDate{ margin: 0; font-size: 12px; color: var(--brand-text-muted); line-height: 1.35; }
    .sparkSvg{ width: 100%; height: 50px; display: block; }
    .sparkPlaceholder{ margin: 8px 0 0 0; font-size: 12px; color: var(--brand-text-muted); }
    .dueLine{ margin: 0; font-size: 13px; font-weight: 700; color: var(--brand-text); }

    .adminCard{ opacity: .95; }
    .adminHeaderRow{
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .adminHeaderRow .sectionHeader{ margin: 0; }
    .adminHelpBtn{ min-width: 98px; }

    .adminHelpOverlay{
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(3,8,14,.72);
      backdrop-filter: blur(2px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .adminHelpModal{
      width: min(740px, 100%);
      max-height: min(86vh, 760px);
      overflow: auto;
      border-radius: 18px;
      border: 1px solid rgba(110,198,255,.3);
      background:
        radial-gradient(110% 110% at -10% -20%, rgba(110,198,255,.10), transparent 55%),
        linear-gradient(160deg, rgba(74,146,255,.10), rgba(15,18,26,.96) 58%);
      box-shadow: 0 20px 44px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.04);
      color: var(--brand-text);
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    .adminHelpTop{
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .adminHelpTitle{
      margin: 0;
      font-size: 24px;
      font-weight: 900;
      color: var(--brand-text);
    }

    .adminHelpLead{
      margin: 0;
      font-size: 14px;
      line-height: 1.45;
      color: var(--brand-text-muted);
    }

    .adminHelpBlock{
      border: 1px solid var(--brand-border-soft);
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
      padding: 10px 12px;
      display: grid;
      gap: 4px;
    }

    .adminHelpLabel{
      margin: 0;
      font-size: 14px;
      font-weight: 800;
      color: var(--brand-text);
    }

    .adminHelpText{
      margin: 0;
      font-size: 14px;
      line-height: 1.45;
      color: var(--brand-text-muted);
    }

    .adminHelpWarn{
      border: 1px solid rgba(255,120,140,.34);
      background: rgba(255,170,190,.12);
    }

    @media (max-width: 900px){
      .programGrid{ grid-template-columns: 1fr; }
      .slotGrid{ grid-template-columns: 1fr; }
      .metricRow{ grid-template-columns: 1fr; }
    }

    .danger{
      background: rgba(255,170,190,.10);
      border: 1px solid rgba(255,120,140,.28);
      padding: 10px 12px;
      border-radius: 14px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.02);
    }

    .gSplashCard{
      max-width: 640px;
      margin: 0 auto;
      border-radius: 24px;
      border: 1px solid rgba(110,198,255,.22);
      background:
        radial-gradient(1100px 360px at -10% -20%, rgba(110,198,255,.14), transparent 55%),
        linear-gradient(165deg, rgba(78,160,232,.12), rgba(15,18,26,.96) 55%);
      color: var(--brand-text);
      text-align: center;
      padding: 26px 22px;
      box-shadow: 0 14px 34px rgba(0,0,0,.32), inset 0 1px 0 rgba(255,255,255,.04);
    }

    .gSplashIcon{
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: #BEEF4E;
      border: 4px solid rgba(255,255,255,.50);
      box-shadow: 0 8px 18px rgba(190,239,78,.18);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px auto;
      overflow: hidden;
    }

    .gSplashIcon img{
      width: 40px;
      height: 40px;
      object-fit: contain;
    }

    .gSplashKicker{
      margin: 2px 0 8px 0;
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #d9ecff;
      font-weight: 700;
    }

    .gSplashTitle{
      margin: 0;
      font-size: 46px;
      line-height: 1;
      font-weight: 900;
      color: var(--brand-text);
    }

    .gSplashSub{
      margin: 12px 0 0 0;
      font-size: 20px;
      line-height: 1.35;
      color: var(--brand-text-muted);
      font-weight: 600;
    }

    .gSplashBtn{
      margin-top: 18px;
      min-width: 230px;
    }

    .gSplashFoot{
      margin: 14px 0 0 0;
      color: var(--z-blue-200);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .panelAppHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom: 12px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid var(--brand-border-soft);
      background: linear-gradient(180deg, rgba(255,255,255,.025), rgba(255,255,255,.012));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.02);
    }

    .panelAppBrand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
      flex: 1 1 320px;
    }

    .panelAppIcon{
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: #BEEF4E;
      border: 4px solid rgba(255,255,255,.45);
      box-shadow: 0 8px 18px rgba(190,239,78,.16);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      flex: 0 0 auto;
    }

    .panelAppIcon img{
      width: 30px;
      height: 30px;
      object-fit: contain;
      display:block;
    }

    .panelAppKicker{
      margin: 0;
      font-size: 11px;
      line-height: 1.1;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--z-blue-200);
    }

    .panelAppTitle{
      margin: 4px 0 0 0;
      font-weight: 900;
      font-size: 24px;
      line-height: 1.05;
      color: var(--brand-info);
      letter-spacing: -0.02em;
    }

    .panelAppSubtitle{
      margin: 4px 0 0 0;
      font-size: 13px;
      line-height: 1.25;
      color: var(--brand-text-muted);
    }

    .panelAppChip{
      flex: 0 0 auto;
      align-self: flex-start;
    }

    @media (max-width: 600px){
      .gSplashCard{
        width: 100%;
        border-radius: 18px;
        padding: 20px 16px;
      }

      .gSplashKicker{
      margin: 2px 0 8px 0;
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #d9ecff;
      font-weight: 700;
    }

    .gSplashTitle{
        font-size: clamp(34px, 11vw, 42px);
      }

      .gSplashSub{
        font-size: 18px;
      }

      .gSplashBtn{
        width: 100%;
        min-width: 0;
      }

      .gSplashFoot{
        font-size: 16px;
      }

      .panelAppHead{
        padding: 10px;
        border-radius: 12px;
      }

      .panelAppBrand{
        flex-basis: 100%;
      }

      .panelAppChip{
        align-self: auto;
      }

      .panelAppTitle{
        font-size: 20px;
      }
    }
  </style>
</head>

<body>
  <header class="tg-desktop-chrome" aria-hidden="true">
    <div class="tg-topbar">
      <div class="tg-topbar__inner">
        <span class="tg-topbar__icon"><img src="/trident-g-platform/branding/Trident-G-Icon.svg" alt="" /></span>
        <a id="suiteBackLink" class="tg-topbar__back" href="../../iq-suite/index.html">Back to Suite</a>
        <span class="tg-topbar__pill">Trident G - IQ</span>
      </div>
    </div>
  </header>
  <div id="root"></div>
  <script src="../../shared-ui/activation-gate.js"></script>
  <script type="text/babel" data-presets="env,react">
    if (window.IQActivationGate) {
      window.IQActivationGate.enforceAppActivation({
        appId: "g_tracker",
        appLabel: "G Tracker",
        manifestUrl: "../../iq-suite/bundle-manifests.json",
        bundleIdHint: new URLSearchParams(window.location.search).get("bundle") || ""
      });
    }

    const Sparkline = ({ values }) => {
      if(values.length === 0){
        return <p className="sparkPlaceholder">No numeric data yet.</p>;
      }
      const width = 220;
      const height = 50;
      const pad = 6;
      const min = Math.min(...values);
      const max = Math.max(...values);
      const range = max - min || 1;
      const step = values.length > 1 ? (width - pad * 2) / (values.length - 1) : 0;
      const points = values.map((value, idx) => {
        const x = pad + idx * step;
        const y = pad + (height - pad * 2) * (1 - (value - min) / range);
        return `${x},${y}`;
      });
      const area = [`${pad},${height - pad}`, ...points, `${width - pad},${height - pad}`].join(" ");
      return (
        <svg className="sparkSvg" viewBox={`0 0 ${width} ${height}`} role="img" aria-label="Recent score trend">
          <polyline points={area} fill="rgba(88,171,255,0.18)" stroke="none" />
          <polyline points={points.join(" ")} fill="none" stroke="#2f7ed0" strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />
          {points.map((point, idx) => {
            const [x, y] = point.split(",").map(Number);
            return <circle key={idx} cx={x} cy={y} r="2.4" fill="#56b4ff" />;
          })}
        </svg>
      );

    function createDefaultState(){
      return {
        schemaVersion: HUB_VERSION,
        program: { ...DEFAULT_PROGRAM },
        cadence: { ...DEFAULT_CADENCE },
        tests: {
          // [testId]: { entries: [{measure_id,timepoint,date_ts,score_payload,notes}] }
        }
      };
    }

    const defaultState = createDefaultState();

    function deepClone(value){
      return JSON.parse(JSON.stringify(value));
    }

    function normaliseDuration(value){
      const parsed = parseInt(value, 10);
      if(Number.isNaN(parsed)) return DEFAULT_PROGRAM.durationDays;
      return Math.min(365, Math.max(7, parsed));
    }

    function normaliseCadence(value, fallback){
      if(!value || !CADENCE_LOOKUP[value]) return fallback;
      return value;
    }

    function normaliseScore(value){
      return String(value ?? "").trim();
    }

    function hasScore(entry){
      return normaliseScore(entry?.score_payload?.score).length > 0;
    }

    function hasNote(entry){
      return String(entry?.notes ?? "").trim().length > 0;
    }

    function isComplete(entry){
      return hasScore(entry) || Boolean(entry?.score_payload?.done);
    }

    function parseNumericScore(value){
      const clean = normaliseScore(value).replace(/,/g, "");
      if(!clean) return null;
      const parsed = Number(clean);
      return Number.isFinite(parsed) ? parsed : null;
    }

    function createEntry(measureId, timepoint){
      return {
        measure_id: measureId,
        timepoint,
        date_ts: "",
        score_payload: { score: "", done: false },
        notes: ""
      };
    }

    function nowISO(){
      return new Date().toISOString();
    }

    function startOfDay(date){
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function parseDateOnly(dateString){
      if(!dateString || typeof dateString !== "string") return null;
      const parsed = new Date(`${dateString}T00:00:00`);
      return Number.isNaN(parsed.getTime()) ? null : parsed;
    }

    function formatDate(ts){
      if(!ts) return "-";
      const parsed = new Date(ts);
      if(Number.isNaN(parsed.getTime())) return "-";
      return parsed.toLocaleDateString();
    }

    function formatDateTime(ts){
      if(!ts) return "-";
      const parsed = new Date(ts);
      if(Number.isNaN(parsed.getTime())) return "-";
      return parsed.toLocaleString();
    }

    function ensureTestRecord(state, testId){
      if(!state.tests[testId]){
        state.tests[testId] = { entries: [] };
      }
      return state.tests[testId];
    }

    function listEntriesFor(state, testId, timepoint){
      const entries = state?.tests?.[testId]?.entries || [];
      if(!timepoint) return entries;
      return entries.filter((entry) => entry.timepoint === timepoint);
    }

    function getLatest(entries){
      if(!entries || entries.length === 0) return null;
      return entries[entries.length - 1];
    }

    function getLatestMatching(entries, predicate){
      if(!entries || entries.length === 0) return null;
      for(let i = entries.length - 1; i >= 0; i -= 1){
        if(predicate(entries[i])) return entries[i];
      }
      return null;
    }

    function normalizeState(rawState){
      const base = createDefaultState();
      if(!rawState || typeof rawState !== "object") return base;

      const merged = {
        ...base,
        ...rawState,
        schemaVersion: HUB_VERSION,
        program: {
          ...base.program,
          ...(rawState.program || {})
        },
        cadence: {
          ...base.cadence,
          ...(rawState.cadence || {})
        }
      };

      merged.program.startDate = typeof merged.program.startDate === "string" ? merged.program.startDate : "";
      merged.program.durationDays = normaliseDuration(merged.program.durationDays);
      merged.program.useMilestones = Boolean(merged.program.useMilestones);
      merged.cadence.psi_cbs = normaliseCadence(merged.cadence.psi_cbs, DEFAULT_CADENCE.psi_cbs);
      merged.cadence.crs10 = normaliseCadence(merged.cadence.crs10, DEFAULT_CADENCE.crs10);

      if(!merged.tests || typeof merged.tests !== "object"){
        merged.tests = {};
      }

      for(const [testId, record] of Object.entries(merged.tests)){
        if(!record || !Array.isArray(record.entries)){
          merged.tests[testId] = { entries: [] };
          continue;
        }
        record.entries = record.entries.map((entry) => ({
          measure_id: entry?.measure_id || testId,
          timepoint: entry?.timepoint || "PRE",
          date_ts: entry?.date_ts || "",
          score_payload: {
            score: String(entry?.score_payload?.score ?? ""),
            done: Boolean(entry?.score_payload?.done)
          },
          notes: String(entry?.notes ?? "")
        }));
      }

      return merged;
    }

    function migrateV1ToV2(v1State){
      const migrated = createDefaultState();

      for(const test of TESTS){
        const oldRecord = v1State?.tests?.[test.id];
        if(!oldRecord) continue;

        const rec = ensureTestRecord(migrated, test.id);
        const pushLegacy = (legacySlot, timepoint) => {
          if(!legacySlot) return;
          const hasValue =
            Boolean(legacySlot.done) ||
            Boolean((legacySlot.score || "").trim()) ||
            Boolean((legacySlot.notes || "").trim()) ||
            Boolean(legacySlot.ts);
          if(!hasValue) return;

          rec.entries.push({
            measure_id: test.id,
            timepoint,
            date_ts: legacySlot.ts || "",
            score_payload: {
              score: legacySlot.score || "",
              done: Boolean(legacySlot.done)
            },
            notes: legacySlot.notes || ""
          });
        };

        pushLegacy(oldRecord.pre, "PRE");
        pushLegacy(oldRecord.post, "POST");
        if(oldRecord.one){
          pushLegacy(oldRecord.one, "PRE");
        }
      }

      return migrated;
    }

    function migrateV2ToV3(v2State){
      return normalizeState(v2State);
    }

    function loadState(){
      try{
        const rawV3 = localStorage.getItem(STORAGE_KEY);
        if(rawV3){
          const parsed = JSON.parse(rawV3);
          if(parsed?.schemaVersion === HUB_VERSION){
            return normalizeState(parsed);
          }
        }

        const rawV2 = localStorage.getItem(STORAGE_KEY_V2);
        if(rawV2){
          const parsedV2 = JSON.parse(rawV2);
          if(parsedV2?.schemaVersion === "ct_hub_v2"){
            return migrateV2ToV3(parsedV2);
          }
        }

        const rawV1 = localStorage.getItem(STORAGE_KEY_V1);
        if(rawV1){
          const parsedV1 = JSON.parse(rawV1);
          if(parsedV1?.schemaVersion === "ct_hub_v1"){
            return migrateV2ToV3(migrateV1ToV2(parsedV1));
          }
        }
      }catch{
        return createDefaultState();
      }
      return createDefaultState();
    }

    function saveState(state){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function getDueInfo(cadenceValue, lastCompletedTs){
      const cadence = CADENCE_LOOKUP[cadenceValue] || CADENCE_LOOKUP.weekly;
      if(cadence.value === "adhoc"){
        return { isDue: false, text: "Log when useful" };
      }
      if(!lastCompletedTs){
        return { isDue: true, text: "Due now" };
      }
      const last = new Date(lastCompletedTs);
      if(Number.isNaN(last.getTime())){
        return { isDue: true, text: "Due now" };
      }
      const elapsed = Math.max(0, Math.floor((startOfDay(new Date()).getTime() - startOfDay(last).getTime()) / DAY_MS));
      if(elapsed >= cadence.days){
        return { isDue: true, text: "Due now" };
      }
      const remaining = cadence.days - elapsed;
      return { isDue: false, text: `Due in ${remaining} day${remaining === 1 ? "" : "s"}` };
    }

    function getSlotSnapshot(state, slot){
      const entries = listEntriesFor(state, slot.testId, slot.timepoint);
      const latest = getLatest(entries);
      const latestComplete = getLatestMatching(entries, (entry) => isComplete(entry));
      const display = latestComplete || latest;
      let status = "not_started";
      if(display && !latestComplete){
        status = "in_progress";
      }else if(latestComplete){
        status = "up_to_date";
      }
      return {
        ...slot,
        entries,
        latest,
        latestComplete,
        score: normaliseScore(display?.score_payload?.score),
        date: display?.date_ts || "",
        note: String(display?.notes || ""),
        hasCompletedScore: Boolean(latestComplete && hasScore(latestComplete)),
        status
      };
    }

    function getOutcomeCardStatus(baseline, post){
      if(baseline.hasCompletedScore && post.hasCompletedScore) return "up_to_date";
      if(baseline.hasCompletedScore && !post.hasCompletedScore) return "due_now";
      if(baseline.status === "in_progress" || post.status === "in_progress") return "in_progress";
      return "not_started";
    }

    function getOutcomeComparison(baselineScore, postScore){
      const baseNum = parseNumericScore(baselineScore);
      const postNum = parseNumericScore(postScore);
      if(baseNum === null || postNum === null){
        if(baselineScore && postScore){
          return { line: "Both baseline and post entries are saved.", bars: null };
        }
        return { line: "", bars: null };
      }
      const delta = Number((postNum - baseNum).toFixed(2));
      const maxValue = Math.max(baseNum, postNum, 1);
      return {
        line: `Delta: ${delta >= 0 ? "+" : ""}${delta} (${baselineScore} -> ${postScore})`,
        bars: [
          { label: "Baseline", value: baseNum, width: (baseNum / maxValue) * 100 },
          { label: "Post", value: postNum, width: (postNum / maxValue) * 100 }
        ]
      };
    }

    function buildOutcomeCardState(def, state){
      const baseline = getSlotSnapshot(state, def.baseline);
      const post = getSlotSnapshot(state, def.post);
      const complete = baseline.hasCompletedScore && post.hasCompletedScore;
      const status = getOutcomeCardStatus(baseline, post);
      const comparison = getOutcomeComparison(baseline.score, post.score);

      let ctaLabel = "Start baseline (Form A)";
      let ctaType = "start";
      let ctaTestId = baseline.testId;
      let targetSlot = baseline;

      if(baseline.hasCompletedScore && !post.hasCompletedScore){
        ctaLabel = "Start post (Form B)";
        ctaTestId = post.testId;
        targetSlot = post;
      }else if(complete){
        ctaLabel = "View results";
        ctaType = "view";
        ctaTestId = null;
        targetSlot = post;
      }

      return { ...def, baseline, post, complete, status, comparison, ctaLabel, ctaType, ctaTestId, targetSlot };
    }

    function buildRepeatableCardState(def, state){
      const entries = listEntriesFor(state, def.testId);
      const completed = entries.filter((entry) => isComplete(entry) && hasScore(entry));
      const latestComplete = getLatest(completed);
      const latestDraft = getLatestMatching(entries, (entry) => !isComplete(entry) && hasNote(entry));
      const cadenceValue = normaliseCadence(state?.cadence?.[def.cadenceKey], DEFAULT_CADENCE[def.cadenceKey]);
      const due = getDueInfo(cadenceValue, latestComplete?.date_ts || "");
      const numericValues = completed.map((entry) => parseNumericScore(entry?.score_payload?.score)).filter((value) => value !== null).slice(-10);

      let status = "not_started";
      if(latestDraft){
        status = "in_progress";
      }else if(latestComplete){
        status = due.isDue ? "due_now" : "up_to_date";
      }
      return { ...def, entries, completed, latestComplete, latestDraft, latestScore: normaliseScore(latestComplete?.score_payload?.score), latestDate: latestComplete?.date_ts || "", cadenceValue, due, numericValues, status };
    }

    function getMilestoneProgress(program){
      const start = parseDateOnly(program.startDate);
      if(!start){
        return { hasTimeline: false, halfway: false, ended: false, followup: false };
      }
      const duration = normaliseDuration(program.durationDays);
      const elapsed = Math.max(0, Math.floor((startOfDay(new Date()).getTime() - start.getTime()) / DAY_MS));
      const halfwayTarget = Math.max(1, Math.floor(duration / 2));
      return {
        hasTimeline: true,
        halfway: elapsed >= halfwayTarget,
        ended: elapsed >= duration,
        followup: elapsed >= duration + 28
      };
    }

    function hasCompletedTimepoint(state, testId, timepoint){
      return listEntriesFor(state, testId, timepoint).some((entry) => isComplete(entry) && hasScore(entry));
    }

    function resolveRepeatableTimepoint(def, state){
      if(!hasCompletedTimepoint(state, def.testId, "PRE")){
        return "PRE";
      }
      if(!state?.program?.useMilestones){
        return "WEEKLY";
      }
      const milestone = getMilestoneProgress(state.program || DEFAULT_PROGRAM);
      if(def.testId === "crs10" && milestone.halfway && !hasCompletedTimepoint(state, def.testId, "MIDPOINT")){
        return "MIDPOINT";
      }
      if(milestone.ended && !hasCompletedTimepoint(state, def.testId, "POST")){
        return "POST";
      }
      if(milestone.followup && !hasCompletedTimepoint(state, def.testId, "FOLLOW_UP")){
        return "FOLLOW_UP";
      }
      return "WEEKLY";
    }

    function saveEntryToState(prevState, { testId, timepoint, score, notes, mode }){
      const scoreText = normaliseScore(score);
      const notesText = String(notes || "").trim();
      if(!scoreText && !notesText){
        return prevState;
      }
      const next = deepClone(prevState);
      const record = ensureTestRecord(next, testId);
      const all = record.entries || [];
      const matches = all.filter((entry) => entry.timepoint === timepoint);

      let target = null;
      if(mode === "repeatable"){
        target = getLatestMatching(matches, (entry) => !isComplete(entry));
        if(!target){
          target = createEntry(testId, timepoint);
          all.push(target);
        }
      }else{
        target = getLatestMatching(matches, (entry) => !isComplete(entry)) || getLatest(matches);
        if(!target){
          target = createEntry(testId, timepoint);
          all.push(target);
        }
      }

      target.score_payload.score = scoreText;
      target.notes = String(notes || "");
      if(scoreText){
        target.score_payload.done = true;
        target.date_ts = nowISO();
      }else{
        target.score_payload.done = false;
        target.date_ts = target.date_ts || nowISO();
      }
      record.entries = all;
      return next;
    }

    function getOutcomeHistory(def, state){
      const rows = [];
      for(const slot of [def.baseline, def.post]){
        const entries = listEntriesFor(state, slot.testId, slot.timepoint);
        for(const entry of entries){
          const score = normaliseScore(entry?.score_payload?.score);
          const notes = String(entry?.notes || "").trim();
          if(!score && !notes) continue;
          rows.push({
            key: `${slot.testId}-${slot.timepoint}-${entry.date_ts}-${score}-${notes}`,
            label: slot.label,
            score: score || "-",
            notes,
            date: formatDateTime(entry?.date_ts),
            ts: new Date(entry?.date_ts || 0).getTime() || 0
          });
        }
      }
      return rows.sort((a, b) => b.ts - a.ts).slice(0, 8);
    }

    function getRepeatableHistory(testId, state){
      return listEntriesFor(state, testId)
        .filter((entry) => {
          const score = normaliseScore(entry?.score_payload?.score);
          const notes = String(entry?.notes || "").trim();
          return Boolean(score || notes);
        })
        .map((entry, index) => ({
          key: `${testId}-${entry.timepoint}-${entry.date_ts}-${index}`,
          score: normaliseScore(entry?.score_payload?.score) || "-",
          notes: String(entry?.notes || "").trim(),
          date: formatDateTime(entry?.date_ts),
          timepoint: TIMEPOINT_LABELS[entry?.timepoint] || entry?.timepoint || "-",
          ts: new Date(entry?.date_ts || 0).getTime() || 0
        }))
        .sort((a, b) => b.ts - a.ts)
        .slice(0, 12);
    }
    function App(){
      const [state, setState] = useState(() => loadState() || defaultState);
      const [toast, setToast] = useState("");
      const [showSplash, setShowSplash] = useState(true);
      const [draftByKey, setDraftByKey] = useState({});
      const [openPanels, setOpenPanels] = useState({});
      const [showAdminHelp, setShowAdminHelp] = useState(false);

      useEffect(() => {
        saveState(state);
      }, [state]);

      useEffect(() => {
        if(!toast) return;
        const timer = setTimeout(() => setToast(""), 2200);
        return () => clearTimeout(timer);
      }, [toast]);

      useEffect(() => {
        if(!showAdminHelp) return;
        const onKeyDown = (event) => {
          if(event.key === "Escape") setShowAdminHelp(false);
        };
        window.addEventListener("keydown", onKeyDown);
        return () => window.removeEventListener("keydown", onKeyDown);
      }, [showAdminHelp]);

      const outcomeCards = useMemo(() => OUTCOME_CARD_DEFS.map((def) => buildOutcomeCardState(def, state)), [state]);
      const repeatableCards = useMemo(() => REPEATABLE_CARD_DEFS.map((def) => buildRepeatableCardState(def, state)), [state]);
      const outcomeCompleted = outcomeCards.filter((card) => card.complete).length;
      const trackersDue = repeatableCards.filter((card) => card.due.isDue).length;

      const getDraft = (key) => draftByKey[key] || { score: "", notes: "" };
      const setDraftField = (key, field, value) => {
        setDraftByKey((prev) => ({
          ...prev,
          [key]: {
            score: prev[key]?.score || "",
            notes: prev[key]?.notes || "",
            [field]: value
          }
        }));
      };
      const clearDraft = (key) => {
        setDraftByKey((prev) => {
          const next = { ...prev };
          delete next[key];
          return next;
        });
      };

      const togglePanel = (panelKey) => {
        setOpenPanels((prev) => ({ ...prev, [panelKey]: !prev[panelKey] }));
      };

      const openTest = (testId) => {
        const test = TEST_BY_ID[testId];
        if(!test) return;
        window.open(test.url, "_blank", "noopener,noreferrer");
      };

      const saveOutcomeDraft = (card) => {
        const key = `outcome_${card.id}`;
        const draft = getDraft(key);
        const score = normaliseScore(draft.score);
        const notes = String(draft.notes || "").trim();
        if(!score && !notes){
          setToast("Enter a score or note first");
          return;
        }
        setState((prev) => saveEntryToState(prev, {
          testId: card.targetSlot.testId,
          timepoint: card.targetSlot.timepoint,
          score: draft.score,
          notes: draft.notes,
          mode: "single"
        }));
        clearDraft(key);
        setToast(score ? "Saved and marked complete" : "Draft saved");
      };

      const saveRepeatableDraft = (card) => {
        const key = `repeat_${card.id}`;
        const draft = getDraft(key);
        const score = normaliseScore(draft.score);
        const notes = String(draft.notes || "").trim();
        if(!score && !notes){
          setToast("Enter a score or note first");
          return;
        }
        const timepoint = resolveRepeatableTimepoint(card, state);
        setState((prev) => saveEntryToState(prev, {
          testId: card.testId,
          timepoint,
          score: draft.score,
          notes: draft.notes,
          mode: "repeatable"
        }));
        clearDraft(key);
        setToast(score ? "Saved and marked complete" : "Draft saved");
      };

      const setCadence = (cadenceKey, value) => {
        setState((prev) => ({
          ...prev,
          cadence: {
            ...prev.cadence,
            [cadenceKey]: normaliseCadence(value, DEFAULT_CADENCE[cadenceKey])
          }
        }));
      };

      const setProgramField = (field, value) => {
        setState((prev) => {
          const nextProgram = { ...prev.program, [field]: value };
          if(field === "durationDays"){
            nextProgram.durationDays = normaliseDuration(value);
          }
          return { ...prev, program: nextProgram };
        });
      };

      const exportJSON = () => {
        const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "g-tracker-export.json";
        a.click();
        URL.revokeObjectURL(url);
      };

      const importJSON = () => {
        const raw = prompt("Paste exported JSON here:");
        if(!raw) return;
        try{
          const parsed = JSON.parse(raw);
          if(parsed?.schemaVersion === HUB_VERSION){
            setState(normalizeState(parsed));
            setToast("Imported");
            return;
          }
          if(parsed?.schemaVersion === "ct_hub_v2"){
            setState(migrateV2ToV3(parsed));
            setToast("Imported (migrated)");
            return;
          }
          if(parsed?.schemaVersion === "ct_hub_v1"){
            setState(migrateV2ToV3(migrateV1ToV2(parsed)));
            setToast("Imported (migrated)");
            return;
          }
          alert("That JSON does not match this hub schema.");
        }catch{
          alert("Could not parse JSON.");
        }
      };

      const resetAll = () => {
        if(!confirm("Reset all locally saved hub data?")) return;
        localStorage.removeItem(STORAGE_KEY);
        localStorage.removeItem(STORAGE_KEY_V2);
        localStorage.removeItem(STORAGE_KEY_V1);
        setState(createDefaultState());
        setToast("Reset");
      };

      if(showSplash){
        return (
          <div className="screen">
            <div className="content" style={{ justifyContent: "center", alignItems: "center" }}>
              <section className="gSplashCard">
                <div className="gSplashIcon">
                  <img src={ICON_SRC} alt="G Tracker icon" onError={(e)=>{ e.target.style.display = "none"; }} />
                </div>
                <p className="gSplashKicker">MINDWARE LAB - TRIDENT G IQ</p>
                <h1 className="gSplashTitle">{APP_NAME}</h1>
                <p className="gSplashSub">Track your valued outcomes for intelligence and resilience for proof of training gains.</p>
                <button className="btn btnPrimary gSplashBtn" onClick={() => setShowSplash(false)}>Continue</button>
                <p className="gSplashFoot">MINDWARE LAB - TRIDENT G IQ</p>
              </section>
            </div>
          </div>
        );
      }

      return (
        <div className="screen">
          <div className="content">
            <div className="card">
              <div className="panelAppBrand" style={{ marginBottom: "8px" }}>
                <div className="panelAppIcon">
                  <img src={ICON_SRC} alt="Trident icon" onError={(e)=>{ e.target.style.display = "none"; }} />
                </div>
                <div>
                  <p className="panelAppKicker">MINDWARE LAB - TRIDENT G IQ</p>
                  <h1 className="panelAppTitle">G Tracker Test Battery</h1>
                </div>
              </div>
              <p className="p">Track outcomes before and after training, plus repeatable weekly trackers.</p>
              <div className="progressStrip">
                Outcome tests: {outcomeCompleted}/{OUTCOME_CARD_DEFS.length} complete  -  Trackers: {trackersDue} due
              </div>

              <div className="programSetup">
                <div className="programGrid">
                  <label className="programField">
                    <span className="programLabel">Programme start date (optional)</span>
                    <input
                      className="input"
                      type="date"
                      value={state.program.startDate || ""}
                      onChange={(e) => setProgramField("startDate", e.target.value)}
                    />
                  </label>
                  <label className="programField">
                    <span className="programLabel">Duration (days)</span>
                    <input
                      className="input"
                      type="number"
                      min={7}
                      max={365}
                      value={state.program.durationDays}
                      onChange={(e) => setProgramField("durationDays", e.target.value)}
                    />
                  </label>
                  <label className="programField">
                    <span className="programLabel">Milestone mode</span>
                    <span className="programToggle">
                      <input
                        type="checkbox"
                        checked={Boolean(state.program.useMilestones)}
                        onChange={(e) => setProgramField("useMilestones", e.target.checked)}
                      />
                      Use milestones (Baseline/Midpoint/Post)
                    </span>
                  </label>
                </div>
              </div>

              {toast && (
                <div style={{
                  marginTop: "10px",
                  padding: "10px 12px",
                  borderRadius: "14px",
                  background: "rgba(204,255,102,0.75)",
                  fontWeight: 900,
                  fontSize: "12px"
                }}>
                  {toast}
                </div>
              )}
            </div>

            <div className="card">
              <h2 className="sectionHeader">Repeatable Trackers</h2>
              <p className="sectionSub">Latest score + trend + due status in one place.</p>
              <div className="grid" style={{ marginTop: "10px" }}>
                {repeatableCards.map((card) => {
                  const historyKey = `history_${card.id}`;
                  const detailsKey = `details_${card.id}`;
                  const draftKey = `repeat_${card.id}`;
                  const draft = getDraft(draftKey);
                  const historyRows = getRepeatableHistory(card.testId, state);
                  const testDef = TEST_BY_ID[card.testId];
                  const targetTimepoint = resolveRepeatableTimepoint(card, state);

                  return (
                    <div className="trackerCard" key={card.id}>
                      <div className="cardActions">
                        <StatusPill status={card.status} />
                        <label className="programToggle" style={{ marginLeft: "auto" }}>
                          Cadence
                          <select className="input" style={{ minWidth: "140px" }} value={card.cadenceValue} onChange={(e) => setCadence(card.cadenceKey, e.target.value)}>
                            {CADENCE_OPTIONS.map((option) => <option key={option.value} value={option.value}>{option.label}</option>)}
                          </select>
                        </label>
                      </div>
                      <p className="trackerTitle">{card.title}</p>
                      <p className="trackerPurpose">{card.purpose}</p>
                      <div className="metricRow">
                        <div className="latestBox">
                          <p className="latestLabel">Latest score</p>
                          <p className="latestValue">{card.latestScore || "-"}</p>
                          <p className="latestDate">{card.latestDate ? `Last taken ${formatDate(card.latestDate)}` : "No completed entries yet"}</p>
                        </div>
                        <div className="sparkBox">
                          <p className="sparkTitle">Recent trend</p>
                          <Sparkline values={card.numericValues} />
                        </div>
                      </div>
                      <p className="dueLine">{card.due.text}</p>
                      <p className="logHint">Log entry for: {TIMEPOINT_LABELS[targetTimepoint] || targetTimepoint}</p>
                      <div className="twoCol">
                        <input className="input inputScoreReady" placeholder="Score" value={draft.score} onChange={(e) => setDraftField(draftKey, "score", e.target.value)} />
                        <input className="input" placeholder="Notes (optional)" value={draft.notes} onChange={(e) => setDraftField(draftKey, "notes", e.target.value)} />
                      </div>
                      <div className="cardActions">
                        <button className="btn btnPrimary" onClick={() => openTest(card.testId)}>Log now</button>
                        <button className="btn btnSecondary" onClick={() => saveRepeatableDraft(card)}>Save</button>
                        <button className="linkBtn" onClick={() => togglePanel(historyKey)} aria-expanded={Boolean(openPanels[historyKey])}>History</button>
                        <span className="inlineDivider"> - </span>
                        <button className="linkBtn" onClick={() => togglePanel(detailsKey)} aria-expanded={Boolean(openPanels[detailsKey])}>Details</button>
                      </div>
                      {openPanels[historyKey] && (
                        <div className="historyBlock">
                          {historyRows.length === 0 ? <p className="historyLine">No saved entries yet.</p> : historyRows.map((row) => (
                            <p className="historyLine" key={row.key}><strong>{row.timepoint}:</strong> {row.score}  -  {row.date}{row.notes ? `  -  ${row.notes}` : ""}</p>
                          ))}
                        </div>
                      )}
                      {openPanels[detailsKey] && (
                        <div className="historyBlock">
                          <p className="historyLine"><strong>{testDef.name}</strong> ({testDef.timing})</p>
                          <p className="historyLine">{testDef.whatText}</p>
                          <p className="historyLine"><strong>When:</strong> {testDef.whenText}</p>
                          <p className="historyLine"><strong>Credentials:</strong> {testDef.credentialsText}</p>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>

            <div className="card">
              <h2 className="sectionHeader">Pre- and Post-Training Only Tests</h2>
              <p className="sectionSub">Each card answers: what is this, where am I, and what do I do next.</p>
              <div className="grid" style={{ marginTop: "10px" }}>
                {outcomeCards.map((card) => {
                  const historyKey = `history_${card.id}`;
                  const detailsKey = `details_${card.id}`;
                  const draftKey = `outcome_${card.id}`;
                  const draft = getDraft(draftKey);
                  const historyRows = getOutcomeHistory(card, state);
                  const detailTestIds = Array.from(new Set([card.baseline.testId, card.post.testId]));
                  const detailTests = detailTestIds.map((id) => TEST_BY_ID[id]).filter(Boolean);

                  return (
                    <div className="trackerCard" key={card.id}>
                      <div className="cardActions">
                        <StatusPill status={card.status} />
                      </div>
                      <p className="trackerTitle">{card.title}</p>
                      <p className="trackerPurpose">{card.purpose}</p>
                      <div className="slotGrid">
                        <div className="slotCard">
                          <p className="slotLabel">{card.baseline.label}</p>
                          <StatusPill status={card.baseline.status} />
                          <p className="slotMetric">{card.baseline.score || "-"}</p>
                          <p className="slotDate">{card.baseline.date ? formatDate(card.baseline.date) : "No entry yet"}</p>
                        </div>
                        <div className="slotCard">
                          <p className="slotLabel">{card.post.label}</p>
                          <StatusPill status={card.post.status} />
                          <p className="slotMetric">{card.post.score || "-"}</p>
                          <p className="slotDate">{card.post.date ? formatDate(card.post.date) : "No entry yet"}</p>
                        </div>
                      </div>
                      <div className="deltaBox">
                        {card.comparison.line && <p className="deltaLine">{card.comparison.line}</p>}
                        {card.comparison.bars && card.comparison.bars.map((bar) => (
                          <div className="deltaBarRow" key={`${card.id}-${bar.label}`}>
                            <span className="deltaBarLabel">{bar.label}</span>
                            <span className="deltaBarTrack">
                              <span className="deltaBarFill" style={{ width: `${Math.max(4, bar.width)}%` }} />
                            </span>
                            <span className="deltaValue">{bar.value}</span>
                          </div>
                        ))}
                      </div>
                      <p className="logHint">Log entry for: {card.targetSlot.label}</p>
                      <div className="twoCol">
                        <input className="input inputScoreReady" placeholder="Score" value={draft.score} onChange={(e) => setDraftField(draftKey, "score", e.target.value)} />
                        <input className="input" placeholder="Notes (optional)" value={draft.notes} onChange={(e) => setDraftField(draftKey, "notes", e.target.value)} />
                      </div>
                      <div className="cardActions">
                        <button className="btn btnPrimary" onClick={() => {
                          if(card.ctaType === "view"){
                            togglePanel(historyKey);
                            return;
                          }
                          openTest(card.ctaTestId);
                        }}>{card.ctaLabel}</button>
                        <button className="btn btnSecondary" onClick={() => saveOutcomeDraft(card)}>Save</button>
                        <button className="linkBtn" onClick={() => togglePanel(historyKey)} aria-expanded={Boolean(openPanels[historyKey])}>History</button>
                        <span className="inlineDivider"> - </span>
                        <button className="linkBtn" onClick={() => togglePanel(detailsKey)} aria-expanded={Boolean(openPanels[detailsKey])}>Details</button>
                      </div>
                      {openPanels[historyKey] && (
                        <div className="historyBlock">
                          {historyRows.length === 0 ? <p className="historyLine">No saved entries yet.</p> : historyRows.map((row) => (
                            <p className="historyLine" key={row.key}><strong>{row.label}:</strong> {row.score}  -  {row.date}{row.notes ? `  -  ${row.notes}` : ""}</p>
                          ))}
                        </div>
                      )}
                      {openPanels[detailsKey] && (
                        <div className="historyBlock">
                          {detailTests.map((test) => (
                            <div key={`${card.id}-${test.id}`}>
                              <p className="historyLine"><strong>{test.name}</strong> ({test.timing})</p>
                              <p className="historyLine">{test.whatText}</p>
                              <p className="historyLine"><strong>When:</strong> {test.whenText}</p>
                              <p className="historyLine"><strong>Credentials:</strong> {test.credentialsText}</p>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>

            <div className="card adminCard">
              <div className="adminHeaderRow">
                <h2 className="sectionHeader">Admin</h2>
                <button className="btn btnInfo adminHelpBtn" onClick={() => setShowAdminHelp(true)}>Help</button>
              </div>
              <p className="sectionSub">Export/import/reset controls for this tracker only.</p>
              <div className="btnRow">
                <button className="btn btnSecondary" onClick={exportJSON}>Export JSON</button>
                <button className="btn btnSecondary" onClick={importJSON}>Import JSON</button>
                <button className="btn btnSecondary" onClick={resetAll}>Reset hub data</button>
              </div>
              <div className="danger" style={{ marginTop: "10px" }}>
                <p className="muted">
                  Tip: local tracker data is device/browser specific. Export JSON if you plan to switch device or clear browser storage.
                </p>
              </div>
            </div>

            {showAdminHelp && (
              <div className="adminHelpOverlay" role="dialog" aria-modal="true" aria-labelledby="adminHelpTitle" onClick={() => setShowAdminHelp(false)}>
                <div className="adminHelpModal" onClick={(event) => event.stopPropagation()}>
                  <div className="adminHelpTop">
                    <h3 id="adminHelpTitle" className="adminHelpTitle">Admin help</h3>
                    <button className="btn btnSecondary" onClick={() => setShowAdminHelp(false)}>Close</button>
                  </div>
                  <p className="adminHelpLead">
                    These controls apply only to this G Tracker data on this device and browser.
                  </p>
                  <div className="adminHelpBlock">
                    <p className="adminHelpLabel">Export JSON</p>
                    <p className="adminHelpText">
                      Downloads your full tracker data file (`g-tracker-export.json`) so you can keep a backup or move data to another device.
                    </p>
                  </div>
                  <div className="adminHelpBlock">
                    <p className="adminHelpLabel">Import JSON</p>
                    <p className="adminHelpText">
                      Replaces the current tracker state with the JSON you paste. Use this to restore from a backup or transfer data.
                    </p>
                  </div>
                  <div className="adminHelpBlock adminHelpWarn">
                    <p className="adminHelpLabel">Reset hub data</p>
                    <p className="adminHelpText">
                      Permanently clears all saved tracker entries, notes, cadence settings, and programme settings for this tracker in local storage.
                      This cannot be undone, so export first if you may need your data later.
                    </p>
                  </div>
                </div>
              </div>
            )}
          </div>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
