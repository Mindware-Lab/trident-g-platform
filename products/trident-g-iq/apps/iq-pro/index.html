<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trident G IQ Pro</title>
  <link rel="icon" type="image/svg+xml" href="./brandingUI/Trident-G-Icon.svg">
  <link rel="stylesheet" href="./brandingUI/Trident-G-brand.css">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="capacity-v2-shell">
    <header class="capacity-v2-brand" aria-label="Trident G IQ Pro branding">
      <div class="capacity-v2-brand-left">
        <span class="capacity-v2-logo"><img src="./brandingUI/Trident-G-Icon.svg" alt=""></span>
        <div>
          <div class="capacity-v2-eyebrow">Trident G - IQ Pro</div>
          <h1>Train Intelligence</h1>
        </div>
      </div>
      <div class="capacity-v2-brand-actions">
        <button class="capacity-sfx-toggle" type="button" data-action="toggle-sound" data-sound-toggle aria-pressed="true" aria-label="Turn Trident G IQ Pro audio off">Audio on</button>
        <button id="iqProAccountButton" class="capacity-suite-back is-visible" type="button">Account</button>
      </div>
    </header>
    <main id="app" class="capacity-v2-app" aria-live="polite"></main>
  </div>

  <script type="module" src="./bootstrap.js"></script>
</body>
</html>
