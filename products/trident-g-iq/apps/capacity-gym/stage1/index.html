<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IQ Capacity Stage 1</title>
  <link rel="stylesheet" href="../brandingUI/Trident-G-brand.css">
  <link rel="stylesheet" href="./ui/theme.css">
  <link rel="stylesheet" href="./styles.css?v=20260311a">
</head>
<body>
  <div class="shell app-shell">
    <header class="app-header hidden-header">
      <strong id="shell-streak">0</strong>
      <strong id="shell-bank">0</strong>
    </header>
    <nav class="nav hidden-nav" aria-label="Primary">
      <a href="#/home" data-route="home"><span>Today</span></a>
      <a href="#/play-hub" data-route="play-hub"><span>Hub</span></a>
      <a href="#/play-relational" data-route="play-relational"><span>Relational</span></a>
      <a href="#/history" data-route="history"><span>Progress</span></a>
      <a href="#/settings" data-route="settings"><span>Settings</span></a>
    </nav>
    <header class="capacity-brand-row" aria-label="Capacity Gym branding">
      <div class="capacity-brand-left">
        <span class="capacity-brand-icon"><img src="../brandingUI/Trident-G-Icon.svg" alt=""></span>
        <a id="suiteBackLink" class="capacity-suite-back" href="../../iq-suite/index.html">Back to IQ Core</a>
      </div>
      <a class="capacity-brand-site" href="https://iqmindware.com/" target="_blank" rel="noopener noreferrer">IQMindware.com</a>
      <span class="capacity-brand-pill">Trident G - IQ</span>
    </header>
    <main id="app" class="main" aria-live="polite"></main>
  </div>
  <script src="../../shared-ui/entitlements-client.js"></script>
  <script src="../../shared-ui/activation-gate.js"></script>
  <script>
    var initSuiteBackLink = function () {
      var link = document.getElementById("suiteBackLink");
      if (!link) return;
      var params = new URLSearchParams(window.location.search);
      var launchedFromSuite = params.get("from") === "iq-core" || Boolean(params.get("bundle"));
      if (!launchedFromSuite) {
        link.classList.remove("is-visible");
        link.setAttribute("aria-hidden", "true");
        return;
      }
      var suiteUrl = new URL("../../iq-suite/index.html", window.location.href);
      if (params.toString()) {
        suiteUrl.search = window.location.search || "";
        suiteUrl.hash = window.location.hash || "";
      }
      link.href = suiteUrl.toString();
      link.classList.add("is-visible");
      link.removeAttribute("aria-hidden");
    };
    initSuiteBackLink();
    var launchBundleId = new URLSearchParams(window.location.search).get("bundle") || "";
    if (window.IQActivationGate) {
      window.IQActivationGate.enforceAppAccess({
        appId: "capacity_gym",
        appLabel: "Capacity Gym",
        manifestUrl: "../../iq-suite/bundle-manifests.json",
        returnTo: "../../iq-suite/index.html",
        bundleIdHint: launchBundleId,
        requiredBundleId: launchBundleId || ""
      });
    }
  </script>
  <script type="module" src="./app.js?v=20260311a"></script>
</body>
</html>
