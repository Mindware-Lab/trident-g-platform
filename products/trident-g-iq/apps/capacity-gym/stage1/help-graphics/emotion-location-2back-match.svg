<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Location 2-back Match</title>
  <desc id="desc">Three emotional displays. At display t, face location matches t-2 while t-1 is in a different location.</desc>
  <defs>
    <style>
      .bg { fill: #f3f7fc; }
      .panel { fill: #ffffff; stroke: #d8e2f0; stroke-width: 2; }
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #10233b; }
      .sub { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #344861; }
      .chip { fill: #eaf2ff; stroke: #9ebff4; stroke-width: 1.5; rx: 12; }
      .txt { font: 600 19px 'Segoe UI', Arial, sans-serif; fill: #10233b; }
      .small { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #4b5f78; }
      .card { fill: #f8fbff; stroke: #d6e3f5; stroke-width: 2; rx: 14; }
      .ref-card { fill: #eef6ff; stroke: #9ebff4; stroke-width: 2; rx: 14; }
      .match-card { fill: #daf4e6; stroke: #6ebe8d; stroke-width: 2; rx: 14; }
      .ring { fill: none; stroke: #c8d6ea; stroke-width: 10; }
      .dot { fill: #d5e2f4; }
      .word { font: 800 36px 'Segoe UI', Arial, sans-serif; text-anchor: middle; letter-spacing: 1px; }
      .token { fill: #fff4e6; stroke: #be9a6f; stroke-width: 2; }
      .head { fill: #fde68a; stroke: #b78a53; stroke-width: 1.4; }
      .eye { fill: #1f2937; }
      .mouth-smile { fill: none; stroke: #1f2937; stroke-width: 2; stroke-linecap: round; }
      .mouth-frown { fill: none; stroke: #1f2937; stroke-width: 2; stroke-linecap: round; }
      .arrow { stroke: #6b7f9b; stroke-width: 3; marker-end: url(#m); }
      .accent { fill: #204a86; font: 700 19px 'Segoe UI', Arial, sans-serif; }
    </style>
    <marker id="m" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#6b7f9b"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="720"/>
  <rect class="panel" x="30" y="26" width="1140" height="668" rx="24"/>
  <text class="title" x="66" y="82">Emotional LOCATION 2-back Match</text>
  <text class="sub" x="66" y="114">Press MATCH at t because face location matches t-2. t-1 appears at a different location.</text>

  <rect class="chip" x="66" y="144" width="250" height="42"/>
  <text class="txt" x="88" y="171">Target: LOCATION</text>

  <g transform="translate(68,212)">
    <rect class="ref-card" x="0" y="0" width="336" height="428"/>
    <text class="txt" x="20" y="36">Display 1 (t-2)</text>
    <circle class="ring" cx="168" cy="210" r="116"/>
    <circle class="dot" cx="168" cy="94" r="6"/>
    <circle class="dot" cx="284" cy="210" r="6"/>
    <circle class="dot" cx="168" cy="326" r="6"/>
    <circle class="dot" cx="52" cy="210" r="6"/>

    <g transform="translate(141,67)">
      <rect class="token" x="0" y="0" width="54" height="54" rx="10"/>
      <circle class="head" cx="27" cy="24" r="16"/>
      <circle class="eye" cx="21" cy="20.5" r="1.7"/>
      <circle class="eye" cx="33" cy="20.5" r="1.7"/>
      <path class="mouth-smile" d="M20 28 Q27 34 34 28"/>
    </g>

    <text class="word" x="168" y="223" fill="#dc2626">CALM</text>
    <text class="small" x="20" y="388">Face location = top node</text>
  </g>

  <g transform="translate(432,212)">
    <rect class="card" x="0" y="0" width="336" height="428"/>
    <text class="txt" x="20" y="36">Display 2 (t-1)</text>
    <circle class="ring" cx="168" cy="210" r="116"/>
    <circle class="dot" cx="168" cy="94" r="6"/>
    <circle class="dot" cx="284" cy="210" r="6"/>
    <circle class="dot" cx="168" cy="326" r="6"/>
    <circle class="dot" cx="52" cy="210" r="6"/>

    <g transform="translate(257,183)">
      <rect class="token" x="0" y="0" width="54" height="54" rx="10"/>
      <circle class="head" cx="27" cy="24" r="16"/>
      <circle class="eye" cx="21" cy="20.5" r="1.7"/>
      <circle class="eye" cx="33" cy="20.5" r="1.7"/>
      <path class="mouth-frown" d="M20 33 Q27 27 34 33"/>
    </g>

    <text class="word" x="168" y="223" fill="#16a34a">TRAP</text>
    <text class="small" x="20" y="388">Face location = right node</text>
  </g>

  <g transform="translate(796,212)">
    <rect class="match-card" x="0" y="0" width="336" height="428"/>
    <text class="txt" x="20" y="36">Display 3 (t)</text>
    <circle class="ring" cx="168" cy="210" r="116"/>
    <circle class="dot" cx="168" cy="94" r="6"/>
    <circle class="dot" cx="284" cy="210" r="6"/>
    <circle class="dot" cx="168" cy="326" r="6"/>
    <circle class="dot" cx="52" cy="210" r="6"/>

    <g transform="translate(141,67)">
      <rect class="token" x="0" y="0" width="54" height="54" rx="10"/>
      <circle class="head" cx="27" cy="24" r="16"/>
      <circle class="eye" cx="21" cy="20.5" r="1.7"/>
      <circle class="eye" cx="33" cy="20.5" r="1.7"/>
      <path class="mouth-smile" d="M20 28 Q27 34 34 28"/>
    </g>

    <text class="word" x="168" y="223" fill="#2563eb">BOOK</text>
    <text class="small" x="20" y="388">Face location = top node (matches t-2)</text>
  </g>

  <line class="arrow" x1="250" y1="664" x2="948" y2="664"/>
  <text class="accent" x="366" y="700">MATCH now: same LOCATION at 2-back (t with t-2)</text>
</svg>
