<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Hub Categorical Help Graphic</title>
  <desc id="desc">Cued n-back with location, color, and letter where LETTER is the target feature.</desc>
  <defs>
    <style>
      .bg { fill: #f3f6fb; }
      .panel { fill: #ffffff; stroke: #d8e1ef; stroke-width: 2; }
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #102033; }
      .sub { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .txt { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #102033; }
      .small { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .chip { fill: #e9f2ff; stroke: #9dc2ff; stroke-width: 1.5; rx: 12; }
      .ring { fill: none; stroke: #c8d6ea; stroke-width: 12; }
      .dot { fill: #d5e2f4; }
      .timeline { fill: #f8fbff; stroke: #d6e3f5; stroke-width: 2; rx: 14; }
      .match { fill: #d7f5e2; stroke: #69c28a; stroke-width: 2; rx: 12; }
      .arrow { stroke: #6b7f9b; stroke-width: 3; marker-end: url(#m); }
      .accent { fill: #204a86; font: 700 18px 'Segoe UI', Arial, sans-serif; }
    </style>
    <marker id="m" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#6b7f9b"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="720"/>
  <rect class="panel" x="30" y="26" width="1140" height="668" rx="24"/>

  <text class="title" x="66" y="82">Hub Categorical</text>
  <text class="sub" x="66" y="114">Target feature shown at block start. Press MATCH when target repeats at n-back.</text>

  <rect class="chip" x="66" y="144" width="230" height="42"/>
  <text class="txt" x="88" y="171">Target: LETTER</text>

  <g transform="translate(90,220)">
    <rect class="timeline" x="0" y="0" width="520" height="420"/>
    <text class="txt" x="24" y="34">Stimulus Arena (example trial)</text>
    <circle class="ring" cx="260" cy="225" r="152"/>
    <circle class="dot" cx="260" cy="73" r="8"/>
    <circle class="dot" cx="412" cy="225" r="8"/>
    <circle class="dot" cx="260" cy="377" r="8"/>
    <circle class="dot" cx="108" cy="225" r="8"/>
    <circle cx="412" cy="225" r="42" fill="#2563eb"/>
    <text x="412" y="235" text-anchor="middle" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#ffffff">A</text>
    <text class="small" x="24" y="390">Each token combines: LOCATION + COLOUR + LETTER.</text>
  </g>

  <g transform="translate(640,220)">
    <rect class="timeline" x="0" y="0" width="470" height="420"/>
    <text class="txt" x="22" y="34">n-back Decision Timeline (target = LETTER)</text>

    <rect x="22" y="74" width="126" height="146" rx="12" fill="#ffffff" stroke="#cfdbed" stroke-width="2"/>
    <text class="small" x="35" y="103">t-2</text>
    <circle cx="85" cy="154" r="26" fill="#dc2626"/>
    <text x="85" y="162" text-anchor="middle" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#ffffff">A</text>
    <text class="small" x="38" y="200">Letter A</text>

    <rect x="172" y="74" width="126" height="146" rx="12" fill="#ffffff" stroke="#cfdbed" stroke-width="2"/>
    <text class="small" x="184" y="103">t-1</text>
    <circle cx="235" cy="154" r="26" fill="#111827"/>
    <text x="235" y="162" text-anchor="middle" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#ffffff">C</text>
    <text class="small" x="188" y="200">Letter C</text>

    <rect class="match" x="322" y="74" width="126" height="146"/>
    <text class="small" x="334" y="103">t</text>
    <circle cx="385" cy="154" r="26" fill="#2563eb"/>
    <text x="385" y="162" text-anchor="middle" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#ffffff">A</text>
    <text class="small" x="338" y="200">Letter A</text>

    <line class="arrow" x1="107" y1="254" x2="365" y2="254"/>
    <text class="accent" x="167" y="247">LETTER match at 2-back</text>

    <rect class="chip" x="22" y="300" width="426" height="86"/>
    <text class="txt" x="40" y="334">Action:</text>
    <text class="small" x="104" y="334">Press MATCH (or Space) now.</text>
    <text class="small" x="40" y="366">Ignore location and colour changes when LETTER is the target.</text>
  </g>
</svg>
