<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Propositional Relational N-Back Help Graphic</title>
  <desc id="desc">Propositional premise n-back with rule-consistent true false quiz examples.</desc>
  <defs>
    <style>
      .bg { fill: #f4f8fc; }
      .panel { fill: #ffffff; stroke: #d8e2ef; stroke-width: 2; }
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #12223a; }
      .sub { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #344861; }
      .txt { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #12223a; }
      .small { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #4b5f78; }
      .card { fill: #f9fbff; stroke: #d6e3f5; stroke-width: 2; rx: 14; }
      .premise { fill: #ffffff; stroke: #ceddee; stroke-width: 2; rx: 10; }
      .quiz { fill: #eef5ff; stroke: #b8cdee; stroke-width: 2; rx: 12; }
      .match { fill: #dbf4e6; stroke: #70bf8f; stroke-width: 2; rx: 10; }
      .rule { fill: #eaf2ff; stroke: #9dbcf1; stroke-width: 1.5; rx: 10; }
      .true { fill: #1f7a48; font: 700 16px 'Segoe UI', Arial, sans-serif; }
      .false { fill: #b02020; font: 700 16px 'Segoe UI', Arial, sans-serif; }
      .accent { fill: #1f4b84; font: 700 18px 'Segoe UI', Arial, sans-serif; }
      .arrow { stroke: #73839a; stroke-width: 3; marker-end: url(#m); }
    </style>
    <marker id="m" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#73839a"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="720"/>
  <rect class="panel" x="30" y="26" width="1140" height="668" rx="24"/>

  <text class="title" x="66" y="82">Relational: Propositional</text>
  <text class="sub" x="66" y="114">Press MATCH when the same canonical premise repeats at n-back.</text>

  <g transform="translate(70,170)">
    <rect class="card" x="0" y="0" width="530" height="500"/>
    <text class="txt" x="22" y="34">Session Premise Bank (example)</text>

    <rect class="premise" x="22" y="62" width="230" height="86"/>
    <text class="txt" x="44" y="112">P</text>
    <text class="small" x="170" y="112">ATOM</text>

    <rect class="premise" x="278" y="62" width="230" height="86"/>
    <text class="txt" x="300" y="112">P -&gt; Q</text>
    <text class="small" x="430" y="112">IMP</text>

    <rect class="premise" x="22" y="164" width="230" height="86"/>
    <text class="txt" x="44" y="214">~Q</text>
    <text class="small" x="170" y="214">NOT</text>

    <rect class="premise" x="278" y="164" width="230" height="86"/>
    <text class="txt" x="300" y="214">R v S</text>
    <text class="small" x="430" y="214">OR</text>

    <text class="txt" x="22" y="294">n-back Stream Example</text>
    <rect class="premise" x="22" y="312" width="145" height="88"/>
    <text class="txt" x="44" y="362">P -&gt; Q</text>
    <text class="small" x="44" y="386">t-2</text>

    <rect class="premise" x="188" y="312" width="145" height="88"/>
    <text class="txt" x="222" y="362">If P then Q</text>
    <text class="small" x="210" y="386">t-1</text>

    <rect class="match" x="354" y="312" width="145" height="88"/>
    <text class="txt" x="380" y="362">P -&gt; Q</text>
    <text class="small" x="394" y="386">t</text>

    <line class="arrow" x1="95" y1="425" x2="420" y2="425"/>
    <text class="accent" x="174" y="418">MATCH (same canonical premise)</text>
  </g>

  <g transform="translate(620,170)">
    <rect class="card" x="0" y="0" width="510" height="500"/>
    <text class="txt" x="24" y="34">Post-Block Quiz (2 timed True/False)</text>

    <rect class="rule" x="24" y="62" width="462" height="48"/>
    <text class="txt" x="42" y="93">Rules used in this session can include MP, MT, DS.</text>

    <rect class="quiz" x="24" y="126" width="462" height="140"/>
    <text class="small" x="42" y="157">Question 1</text>
    <text class="txt" x="42" y="188">From the session premises, Q is true.</text>
    <text class="true" x="42" y="224">Correct answer: TRUE (example MP-consistent case)</text>

    <rect class="quiz" x="24" y="282" width="462" height="140"/>
    <text class="small" x="42" y="313">Question 2</text>
    <text class="txt" x="42" y="344">From the session premises, P is not true.</text>
    <text class="false" x="42" y="380">Correct answer: FALSE (example foil)</text>

    <rect class="match" x="24" y="438" width="462" height="42"/>
    <text class="txt" x="42" y="466">Action: keep stream rhythm, then answer quickly before timeout.</text>
  </g>
</svg>
