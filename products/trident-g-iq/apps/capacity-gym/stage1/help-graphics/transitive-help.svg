<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Transitive Relational N-Back Help Graphic</title>
  <desc id="desc">Transitive relation tokens with a two-item true false quiz example.</desc>
  <defs>
    <style>
      .bg { fill: #f4f8fc; }
      .panel { fill: #ffffff; stroke: #d7e1ef; stroke-width: 2; }
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #12223a; }
      .sub { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #344861; }
      .txt { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #12223a; }
      .small { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #4b5f78; }
      .card { fill: #f9fbff; stroke: #d5e2f5; stroke-width: 2; rx: 14; }
      .token { fill: #ffffff; stroke: #ceddee; stroke-width: 2; rx: 10; }
      .match { fill: #dbf4e6; stroke: #70bf8f; stroke-width: 2; rx: 10; }
      .quiz { fill: #eef5ff; stroke: #b8cdee; stroke-width: 2; rx: 12; }
      .true { fill: #1f7a48; font: 700 16px 'Segoe UI', Arial, sans-serif; }
      .false { fill: #b02020; font: 700 16px 'Segoe UI', Arial, sans-serif; }
      .accent { fill: #1f4b84; font: 700 18px 'Segoe UI', Arial, sans-serif; }
      .arrow { stroke: #73839a; stroke-width: 3; marker-end: url(#m); }
    </style>
    <marker id="m" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#73839a"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="720"/>
  <rect class="panel" x="30" y="26" width="1140" height="668" rx="24"/>

  <text class="title" x="66" y="82">Relational: Transitive</text>
  <text class="sub" x="66" y="114">Press MATCH when the same underlying relation repeats at n-back.</text>

  <g transform="translate(70,170)">
    <rect class="card" x="0" y="0" width="520" height="500"/>
    <text class="txt" x="22" y="34">Stream Tokens (surface can vary, meaning stays fixed)</text>

    <rect class="token" x="22" y="62" width="145" height="88"/>
    <text class="txt" x="44" y="112">A &gt; B</text>
    <text class="small" x="44" y="136">t-2</text>

    <rect class="token" x="188" y="62" width="145" height="88"/>
    <text class="txt" x="224" y="112">B = C</text>
    <text class="small" x="210" y="136">t-1</text>

    <rect class="match" x="354" y="62" width="145" height="88"/>
    <text class="txt" x="388" y="112">B &lt; A</text>
    <text class="small" x="394" y="136">t</text>

    <line class="arrow" x1="95" y1="175" x2="420" y2="175"/>
    <text class="accent" x="180" y="168">MATCH (same canon as A &gt; B)</text>

    <text class="txt" x="22" y="240">Block Premise Model</text>
    <rect class="token" x="22" y="258" width="476" height="86"/>
    <text class="txt" x="44" y="309">A &gt; B,   B = C,   C &gt; D</text>

    <text class="small" x="22" y="386">Use this model for the quiz after stream trials.</text>
    <text class="small" x="22" y="414">Each block ends with 2 timed True/False prompts.</text>
  </g>

  <g transform="translate(620,170)">
    <rect class="card" x="0" y="0" width="510" height="500"/>
    <text class="txt" x="24" y="34">Post-Block Quiz (2 items, timed)</text>

    <rect class="quiz" x="24" y="62" width="462" height="156"/>
    <text class="small" x="42" y="95">Question 1</text>
    <text class="txt" x="42" y="126">From the block premises, is A &gt; C true?</text>
    <text class="true" x="42" y="162">Correct answer: TRUE</text>
    <text class="small" x="42" y="192">Reason: A &gt; B and B = C imply A &gt; C.</text>

    <rect class="quiz" x="24" y="238" width="462" height="156"/>
    <text class="small" x="42" y="271">Question 2</text>
    <text class="txt" x="42" y="302">From the block premises, is D &gt; B true?</text>
    <text class="false" x="42" y="338">Correct answer: FALSE</text>
    <text class="small" x="42" y="368">Not supported by the same relation model.</text>

    <rect x="24" y="418" width="462" height="62" rx="10" fill="#e8f1ff" stroke="#b7cdee" stroke-width="2"/>
    <text class="txt" x="42" y="456">Action: keep n-back rhythm, then answer True/False quickly.</text>
  </g>
</svg>
