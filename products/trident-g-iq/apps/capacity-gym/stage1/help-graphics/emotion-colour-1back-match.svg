<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Emotional Colour 1-back Match</title>
  <desc id="desc">Two emotional displays. At display t, the center word colour matches display t-1. Face location and expression may change.</desc>
  <defs>
    <style>
      .bg { fill: #f3f7fc; }
      .panel { fill: #ffffff; stroke: #d8e2f0; stroke-width: 2; }
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #10233b; }
      .sub { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #344861; }
      .chip { fill: #eaf2ff; stroke: #9ebff4; stroke-width: 1.5; rx: 12; }
      .txt { font: 600 20px 'Segoe UI', Arial, sans-serif; fill: #10233b; }
      .small { font: 500 17px 'Segoe UI', Arial, sans-serif; fill: #4b5f78; }
      .card { fill: #f8fbff; stroke: #d6e3f5; stroke-width: 2; rx: 14; }
      .match-card { fill: #daf4e6; stroke: #6ebe8d; stroke-width: 2; rx: 14; }
      .ring { fill: none; stroke: #c8d6ea; stroke-width: 12; }
      .dot { fill: #d5e2f4; }
      .word { font: 800 44px 'Segoe UI', Arial, sans-serif; text-anchor: middle; letter-spacing: 1px; }
      .token { fill: #fff4e6; stroke: #be9a6f; stroke-width: 2; }
      .head { fill: #fde68a; stroke: #b78a53; stroke-width: 1.4; }
      .eye { fill: #1f2937; }
      .mouth-smile { fill: none; stroke: #1f2937; stroke-width: 2; stroke-linecap: round; }
      .mouth-frown { fill: none; stroke: #1f2937; stroke-width: 2; stroke-linecap: round; }
      .arrow { stroke: #6b7f9b; stroke-width: 3; marker-end: url(#m); }
      .accent { fill: #204a86; font: 700 19px 'Segoe UI', Arial, sans-serif; }
    </style>
    <marker id="m" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#6b7f9b"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="720"/>
  <rect class="panel" x="30" y="26" width="1140" height="668" rx="24"/>
  <text class="title" x="66" y="82">Emotional COLOUR 1-back Match</text>
  <text class="sub" x="66" y="114">Press MATCH at t because word colour repeats from t-1. Ignore face expression and location changes.</text>

  <rect class="chip" x="66" y="144" width="230" height="42"/>
  <text class="txt" x="88" y="171">Target: COLOUR</text>

  <g transform="translate(110,215)">
    <rect class="card" x="0" y="0" width="440" height="420"/>
    <text class="txt" x="24" y="36">Display 1 (t-1)</text>
    <circle class="ring" cx="220" cy="210" r="140"/>
    <circle class="dot" cx="220" cy="70" r="7"/>
    <circle class="dot" cx="360" cy="210" r="7"/>
    <circle class="dot" cx="220" cy="350" r="7"/>
    <circle class="dot" cx="80" cy="210" r="7"/>

    <g transform="translate(333,183)">
      <rect class="token" x="0" y="0" width="54" height="54" rx="10"/>
      <circle class="head" cx="27" cy="24" r="16"/>
      <circle class="eye" cx="21" cy="20.5" r="1.7"/>
      <circle class="eye" cx="33" cy="20.5" r="1.7"/>
      <path class="mouth-smile" d="M20 28 Q27 34 34 28"/>
    </g>

    <text class="word" x="220" y="226" fill="#dc2626">RISK</text>
    <text class="small" x="24" y="384">Word colour = Red</text>
  </g>

  <g transform="translate(650,215)">
    <rect class="match-card" x="0" y="0" width="440" height="420"/>
    <text class="txt" x="24" y="36">Display 2 (t)</text>
    <circle class="ring" cx="220" cy="210" r="140"/>
    <circle class="dot" cx="220" cy="70" r="7"/>
    <circle class="dot" cx="360" cy="210" r="7"/>
    <circle class="dot" cx="220" cy="350" r="7"/>
    <circle class="dot" cx="80" cy="210" r="7"/>

    <g transform="translate(53,183)">
      <rect class="token" x="0" y="0" width="54" height="54" rx="10"/>
      <circle class="head" cx="27" cy="24" r="16"/>
      <circle class="eye" cx="21" cy="20.5" r="1.7"/>
      <circle class="eye" cx="33" cy="20.5" r="1.7"/>
      <path class="mouth-frown" d="M20 33 Q27 27 34 33"/>
    </g>

    <text class="word" x="220" y="226" fill="#dc2626">CALM</text>
    <text class="small" x="24" y="384">Word colour = Red (matches t-1)</text>
  </g>

  <line class="arrow" x1="520" y1="650" x2="690" y2="650"/>
  <text class="accent" x="438" y="686">MATCH now: same COLOUR at 1-back</text>
</svg>
