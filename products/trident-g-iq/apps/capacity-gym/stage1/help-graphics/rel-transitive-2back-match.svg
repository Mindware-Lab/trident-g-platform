<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Transitive 2-back Match</title>
  <desc id="desc">Three displays showing a transitive 2-back match with alternate surface notation.</desc>
  <defs>
    <style>
      .bg { fill: #f4f8fc; }
      .panel { fill: #ffffff; stroke: #d8e2ef; stroke-width: 2; }
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #12223a; }
      .sub { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #344861; }
      .card { fill: #f9fbff; stroke: #d6e3f5; stroke-width: 2; rx: 14; }
      .match { fill: #dbf4e6; stroke: #70bf8f; stroke-width: 2; rx: 14; }
      .txt { font: 600 20px 'Segoe UI', Arial, sans-serif; fill: #12223a; }
      .small { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #4b5f78; }
      .accent { fill: #1f4b84; font: 700 19px 'Segoe UI', Arial, sans-serif; }
      .chip { fill: #eaf2ff; stroke: #9dbcf1; stroke-width: 1.5; rx: 12; }
      .arrow { stroke: #73839a; stroke-width: 3; marker-end: url(#m); }
    </style>
    <marker id="m" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#73839a"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="720"/>
  <rect class="panel" x="30" y="26" width="1140" height="668" rx="24"/>

  <text class="title" x="66" y="82">Transitive: 2-back Match</text>
  <text class="sub" x="66" y="114">Press MATCH at t when canonical relation matches t-2.</text>
  <rect class="chip" x="66" y="144" width="280" height="42"/>
  <text class="small" x="86" y="171">Equality relation shown in alternate surface form</text>

  <g transform="translate(55,220)">
    <rect class="card" x="0" y="0" width="350" height="390"/>
    <text class="txt" x="18" y="34">Display 1 (t-2)</text>
    <rect x="18" y="64" width="314" height="236" rx="12" fill="#ffffff" stroke="#ceddee" stroke-width="2"/>
    <text x="175" y="195" text-anchor="middle" font-size="56" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#12223a">C = D</text>
    <text class="small" x="18" y="348">Canonical relation: EQ:C=D</text>
  </g>

  <g transform="translate(425,220)">
    <rect class="card" x="0" y="0" width="350" height="390"/>
    <text class="txt" x="18" y="34">Display 2 (t-1)</text>
    <rect x="18" y="64" width="314" height="236" rx="12" fill="#ffffff" stroke="#ceddee" stroke-width="2"/>
    <text x="175" y="195" text-anchor="middle" font-size="56" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#12223a">A &gt; B</text>
    <text class="small" x="18" y="348">Canonical relation: ORD:A&gt;B</text>
  </g>

  <g transform="translate(795,220)">
    <rect class="match" x="0" y="0" width="350" height="390"/>
    <text class="txt" x="18" y="34">Display 3 (t)</text>
    <rect x="18" y="64" width="314" height="236" rx="12" fill="#ffffff" stroke="#ceddee" stroke-width="2"/>
    <text x="175" y="195" text-anchor="middle" font-size="56" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#12223a">D = C</text>
    <text class="small" x="18" y="348">Canonical relation: EQ:C=D (match)</text>
  </g>

  <line class="arrow" x1="230" y1="650" x2="965" y2="650"/>
  <text class="accent" x="415" y="686">MATCH now: same canonical relation at 2-back</text>
</svg>
