<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>Brain State</title>
  <rect width="64" height="64" rx="13" fill="#1a1f2b"/>
  <rect x="0.75" y="0.75" width="62.5" height="62.5" rx="12.25" fill="none" stroke="#22AAFF" stroke-width="1.5" stroke-opacity="0.7"/>

  <!-- Brain silhouette — left hemisphere -->
  <path d="
    M32 16
    C28 16 23 18 21 22
    C18 24 17 28 18 31
    C16 33 16 37 19 39
    C19 43 22 46 26 46
    L32 46
  " fill="none" stroke="#22AAFF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Brain silhouette — right hemisphere -->
  <path d="
    M32 16
    C36 16 41 18 43 22
    C46 24 47 28 46 31
    C48 33 48 37 45 39
    C45 43 42 46 38 46
    L32 46
  " fill="none" stroke="#22AAFF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- centre divide -->
  <line x1="32" y1="16" x2="32" y2="46" stroke="#22AAFF" stroke-width="1.2" stroke-linecap="round" stroke-dasharray="2.5 2.5" opacity="0.4"/>

  <!-- left fold lines -->
  <path d="M22 26 C25 24 27 28 24 30" fill="none" stroke="#22AAFF" stroke-width="1.6" stroke-linecap="round" opacity="0.6"/>
  <path d="M20 34 C23 32 25 36 22 38" fill="none" stroke="#22AAFF" stroke-width="1.6" stroke-linecap="round" opacity="0.6"/>

  <!-- right fold lines -->
  <path d="M42 26 C39 24 37 28 40 30" fill="none" stroke="#22AAFF" stroke-width="1.6" stroke-linecap="round" opacity="0.6"/>
  <path d="M44 34 C41 32 39 36 42 38" fill="none" stroke="#22AAFF" stroke-width="1.6" stroke-linecap="round" opacity="0.6"/>

  <!-- activity pulse dots -->
  <circle cx="27" cy="22" r="1.8" fill="#22AAFF" opacity="0.9"/>
  <circle cx="37" cy="22" r="1.8" fill="#22AAFF" opacity="0.9"/>
  <circle cx="32" cy="36" r="1.4" fill="#22AAFF" opacity="0.5"/>

  <!-- brain stem -->
  <path d="M29 46 Q32 50 35 46" fill="none" stroke="#22AAFF" stroke-width="2" stroke-linecap="round"/>
</svg>
