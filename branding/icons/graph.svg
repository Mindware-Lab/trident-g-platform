<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>Graph</title>
  <rect width="64" height="64" rx="13" fill="#1a1f2b"/>
  <rect x="0.75" y="0.75" width="62.5" height="62.5" rx="12.25" fill="none" stroke="#22AAFF" stroke-width="1.5" stroke-opacity="0.7"/>

  <!-- axes -->
  <line x1="13" y1="50" x2="53" y2="50" stroke="#22AAFF" stroke-width="1.6" stroke-linecap="round" opacity="0.45"/>
  <line x1="13" y1="50" x2="13" y2="14" stroke="#22AAFF" stroke-width="1.6" stroke-linecap="round" opacity="0.45"/>

  <!-- axis arrow tips -->
  <path d="M10 18 L13 13 L16 18" fill="none" stroke="#22AAFF" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.45"/>
  <path d="M49 47 L54 50 L49 53" fill="none" stroke="#22AAFF" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.45"/>

  <!-- grid lines (subtle) -->
  <line x1="13" y1="40" x2="53" y2="40" stroke="#22AAFF" stroke-width="1" stroke-dasharray="2 3" opacity="0.15"/>
  <line x1="13" y1="30" x2="53" y2="30" stroke="#22AAFF" stroke-width="1" stroke-dasharray="2 3" opacity="0.15"/>
  <line x1="13" y1="20" x2="53" y2="20" stroke="#22AAFF" stroke-width="1" stroke-dasharray="2 3" opacity="0.15"/>

  <!-- performance line — upward trend with a dip -->
  <polyline
    points="13,46 20,42 26,38 30,41 35,33 41,27 48,19"
    fill="none" stroke="#22AAFF" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- data point dots -->
  <circle cx="13" cy="46" r="2.2" fill="#22AAFF"/>
  <circle cx="20" cy="42" r="2.2" fill="#22AAFF"/>
  <circle cx="26" cy="38" r="2.2" fill="#22AAFF"/>
  <circle cx="30" cy="41" r="2.2" fill="#1a1f2b" stroke="#22AAFF" stroke-width="2"/>
  <circle cx="35" cy="33" r="2.2" fill="#22AAFF"/>
  <circle cx="41" cy="27" r="2.2" fill="#22AAFF"/>
  <circle cx="48" cy="19" r="2.8" fill="#22AAFF"/>
</svg>
