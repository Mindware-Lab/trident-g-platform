<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>Confidence Level</title>
  <rect width="64" height="64" rx="13" fill="#1a1f2b"/>
  <rect x="0.75" y="0.75" width="62.5" height="62.5" rx="12.25" fill="none" stroke="#22AAFF" stroke-width="1.5" stroke-opacity="0.7"/>

  <!-- gauge arc background (full 180°) -->
  <path d="M13 40 a19 19 0 0 1 38 0" fill="none" stroke="#22AAFF" stroke-width="3.5" stroke-linecap="round" opacity="0.18"/>

  <!-- gauge arc fill — ~75% confidence -->
  <path d="M13 40 a19 19 0 0 1 28.8 -13.5" fill="none" stroke="#22AAFF" stroke-width="3.5" stroke-linecap="round"/>

  <!-- tick marks -->
  <!-- low -->
  <line x1="13" y1="40" x2="14.8" y2="35.5" stroke="#22AAFF" stroke-width="1.4" stroke-linecap="round" opacity="0.5" transform="rotate(0 32 40)"/>
  <!-- mid-low -->
  <line x1="32" y1="21" x2="32" y2="24.5" stroke="#22AAFF" stroke-width="1.4" stroke-linecap="round" opacity="0.5"/>
  <!-- high -->
  <line x1="51" y1="40" x2="49.2" y2="35.5" stroke="#22AAFF" stroke-width="1.4" stroke-linecap="round" opacity="0.5"/>

  <!-- needle — pointing to ~75% -->
  <line x1="32" y1="40" x2="43.5" y2="24.5" stroke="#22AAFF" stroke-width="2" stroke-linecap="round"/>
  <!-- needle pivot -->
  <circle cx="32" cy="40" r="3" fill="#1a1f2b" stroke="#22AAFF" stroke-width="2"/>
  <circle cx="32" cy="40" r="1.2" fill="#22AAFF"/>

  <!-- value label -->
  <text x="32" y="52" font-family="'DM Mono','Courier New',monospace" font-size="8" fill="#22AAFF" opacity="0.7" text-anchor="middle" letter-spacing="0.5">HIGH</text>

  <!-- low / high end labels -->
  <text x="11" y="51" font-family="'DM Mono','Courier New',monospace" font-size="6.5" fill="#22AAFF" opacity="0.35" text-anchor="middle">0</text>
  <text x="53" y="51" font-family="'DM Mono','Courier New',monospace" font-size="6.5" fill="#22AAFF" opacity="0.35" text-anchor="middle">1</text>
</svg>
