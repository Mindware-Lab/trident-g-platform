<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>Locked In</title>
  <!-- card background -->
  <rect width="64" height="64" rx="13" fill="#1a1f2b"/>
  <rect x="0.75" y="0.75" width="62.5" height="62.5" rx="12.25" fill="none" stroke="#22AAFF" stroke-width="1.5" stroke-opacity="0.7"/>

  <!-- focus crosshair corners -->
  <path d="M13 20 L13 13 L20 13" fill="none" stroke="#22AAFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  <path d="M44 13 L51 13 L51 20" fill="none" stroke="#22AAFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  <path d="M13 44 L13 51 L20 51" fill="none" stroke="#22AAFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  <path d="M51 44 L51 51 L44 51" fill="none" stroke="#22AAFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>

  <!-- padlock body -->
  <rect x="22" y="34" width="20" height="15" rx="3" fill="none" stroke="#22AAFF" stroke-width="2.2" stroke-linejoin="round"/>
  <!-- padlock shackle -->
  <path d="M26.5 34 V27.5 a5.5 5.5 0 0 1 11 0 V34" fill="none" stroke="#22AAFF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- keyhole -->
  <circle cx="32" cy="40.5" r="2.2" fill="#22AAFF"/>
  <line x1="32" y1="42.5" x2="32" y2="46" stroke="#22AAFF" stroke-width="2" stroke-linecap="round"/>
</svg>
