<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>In the Zone</title>
  <rect width="64" height="64" rx="13" fill="#1a1f2b"/>
  <rect x="0.75" y="0.75" width="62.5" height="62.5" rx="12.25" fill="none" stroke="#22AAFF" stroke-width="1.5" stroke-opacity="0.7"/>

  <!-- bullseye rings -->
  <circle cx="32" cy="32" r="19" fill="none" stroke="#22AAFF" stroke-width="1.6" opacity="0.35"/>
  <circle cx="32" cy="32" r="13" fill="none" stroke="#22AAFF" stroke-width="1.8" opacity="0.6"/>
  <circle cx="32" cy="32" r="7"  fill="none" stroke="#22AAFF" stroke-width="2"/>

  <!-- crosshair lines (short, outside inner ring) -->
  <line x1="32" y1="9"  x2="32" y2="18" stroke="#22AAFF" stroke-width="1.6" stroke-linecap="round" opacity="0.5"/>
  <line x1="32" y1="46" x2="32" y2="55" stroke="#22AAFF" stroke-width="1.6" stroke-linecap="round" opacity="0.5"/>
  <line x1="9"  y1="32" x2="18" y2="32" stroke="#22AAFF" stroke-width="1.6" stroke-linecap="round" opacity="0.5"/>
  <line x1="46" y1="32" x2="55" y2="32" stroke="#22AAFF" stroke-width="1.6" stroke-linecap="round" opacity="0.5"/>

  <!-- centre dot — locked on -->
  <circle cx="32" cy="32" r="3" fill="#22AAFF"/>
</svg>
