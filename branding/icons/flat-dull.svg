<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>Flat / Dull</title>
  <rect width="64" height="64" rx="13" fill="#1a1f2b"/>
  <rect x="0.75" y="0.75" width="62.5" height="62.5" rx="12.25" fill="none" stroke="#22AAFF" stroke-width="1.5" stroke-opacity="0.7"/>

  <!-- EEG / brainwave line — flat, barely alive -->
  <!-- lead-in flat -->
  <polyline
    points="10,32 20,32 23,28 25,36 27,32 37,32 40,29 42,35 44,32 54,32"
    fill="none" stroke="#22AAFF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>

  <!-- flat dominant line -->
  <line x1="10" y1="36" x2="54" y2="36" stroke="#22AAFF" stroke-width="2.2" stroke-linecap="round"/>

  <!-- downward arrow — energy sinking -->
  <line x1="32" y1="42" x2="32" y2="50" stroke="#22AAFF" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M28 47 L32 51 L36 47" fill="none" stroke="#22AAFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>

  <!-- dim dots above line suggesting suppressed activity -->
  <circle cx="22" cy="26" r="1.5" fill="#22AAFF" opacity="0.25"/>
  <circle cx="32" cy="26" r="1.5" fill="#22AAFF" opacity="0.15"/>
  <circle cx="42" cy="26" r="1.5" fill="#22AAFF" opacity="0.1"/>
</svg>
