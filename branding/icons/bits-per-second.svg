<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>Bits / Second</title>
  <rect width="64" height="64" rx="13" fill="#1a1f2b"/>
  <rect x="0.75" y="0.75" width="62.5" height="62.5" rx="12.25" fill="none" stroke="#22AAFF" stroke-width="1.5" stroke-opacity="0.7"/>

  <!-- binary stream — stacked 1s and 0s, fading in from left -->
  <!-- col 1 dim -->
  <text x="12" y="24" font-family="'DM Mono',monospace" font-size="9" fill="#22AAFF" opacity="0.2" text-anchor="middle">1</text>
  <text x="12" y="34" font-family="'DM Mono',monospace" font-size="9" fill="#22AAFF" opacity="0.2" text-anchor="middle">0</text>
  <text x="12" y="44" font-family="'DM Mono',monospace" font-size="9" fill="#22AAFF" opacity="0.2" text-anchor="middle">1</text>
  <!-- col 2 -->
  <text x="23" y="24" font-family="'DM Mono',monospace" font-size="9" fill="#22AAFF" opacity="0.45" text-anchor="middle">0</text>
  <text x="23" y="34" font-family="'DM Mono',monospace" font-size="9" fill="#22AAFF" opacity="0.45" text-anchor="middle">1</text>
  <text x="23" y="44" font-family="'DM Mono',monospace" font-size="9" fill="#22AAFF" opacity="0.45" text-anchor="middle">0</text>
  <!-- col 3 bright -->
  <text x="34" y="24" font-family="'DM Mono',monospace" font-size="9" fill="#22AAFF" opacity="0.8" text-anchor="middle">1</text>
  <text x="34" y="34" font-family="'DM Mono',monospace" font-size="9" fill="#22AAFF" opacity="0.8" text-anchor="middle">1</text>
  <text x="34" y="44" font-family="'DM Mono',monospace" font-size="9" fill="#22AAFF" opacity="0.8" text-anchor="middle">0</text>

  <!-- speed arrow pointing right -->
  <line x1="40" y1="32" x2="53" y2="32" stroke="#22AAFF" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M49 27.5 L54 32 L49 36.5" fill="none" stroke="#22AAFF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- motion blur lines on arrow -->
  <line x1="40" y1="28.5" x2="46" y2="28.5" stroke="#22AAFF" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  <line x1="40" y1="35.5" x2="46" y2="35.5" stroke="#22AAFF" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
</svg>
